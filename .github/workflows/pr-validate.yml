name: pr-validate

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      # R9: enforce that meta.author equals the PR author (and the path).
      - name: Validate collections (identity-gated)
        run: node scripts/validate.mjs --pr-author "${{ github.event.pull_request.user.login }}"
      # index.json must be regenerated and committed when a collection changes.
      - name: Check index.json is up to date
        run: node scripts/build-index.mjs --check

  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Run tests
        run: node --test
