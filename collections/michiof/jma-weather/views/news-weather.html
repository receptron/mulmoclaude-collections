    <script>
      const { token, dataUrl } = window.__MC_VIEW;
      const auth = { Authorization: "Bearer " + token };

      // 10 都市 + 該当する都道府県 class (Geolonia の prefecture class 名)。
      // xPct/yPct は prefecture bbox 内のどこにカードを置くかの実測ベース割合 (0-1)。
      // - Tokyo は bbox に Izu / Ogasawara 諸島を含むので yPct は極端に小さい (北端の都心)
      // - Okinawa は bbox に Yaeyama/Miyako 諸島を含むので xPct は右寄り (本島南部)
      // - Hokkaido は bbox に小島を含むので xPct は左寄り (南西の札幌)
      // excludeFromNational: 全国地図 / 全国リストから除外する (city-picker には残る)。
      //   自動付与はしない。重複都市を national から外したい場合のみユーザーが手動で flag を立てる。
      // placement: 被り回避のためのカードオフセット方向
      //   center / N / S / E / W / NE / NW / SE / SW
      //   (CSS で translate を方向別に分岐する。約 70px ずらす)
      const CITY_ORDER = [
        { office: "016000", name: "札幌",   region: "北海道",   pref: "hokkaido",  xPct: 0.18, yPct: 0.70, placement: "center" },
        { office: "040000", name: "仙台",   region: "宮城県",   pref: "miyagi",    xPct: 0.45, yPct: 0.50, placement: "E" },
        { office: "150000", name: "新潟",   region: "新潟県",   pref: "niigata",   xPct: 0.50, yPct: 0.30, placement: "N" },
        { office: "130000", name: "東京",   region: "東京都",   pref: "tokyo",     xPct: 0.45, yPct: 0.09, placement: "E" },
        { office: "140000", name: "横浜",   region: "神奈川県", pref: "kanagawa",  xPct: 0.65, yPct: 0.40, placement: "center" },
        { office: "230000", name: "名古屋", region: "愛知県",   pref: "aichi",     xPct: 0.45, yPct: 0.20, placement: "S" },
        { office: "270000", name: "大阪",   region: "大阪府",   pref: "osaka",     xPct: 0.55, yPct: 0.45, placement: "N" },
        { office: "320000", name: "松江",   region: "島根県",   pref: "shimane",   xPct: 0.80, yPct: 0.50, placement: "N" },
        { office: "370000", name: "高松",   region: "香川県",   pref: "kagawa",    xPct: 0.55, yPct: 0.55, placement: "S" },
        { office: "400000", name: "福岡",   region: "福岡県",   pref: "fukuoka",   xPct: 0.40, yPct: 0.30, placement: "center" },
        { office: "471000", name: "那覇",   region: "沖縄本島", pref: "okinawa",   xPct: 0.88, yPct: 0.40, placement: "center" },
      ];
      const NATIONAL_CITIES = CITY_ORDER.filter((c) => !c.excludeFromNational);
      const DEFAULT_CITY = "140000";

      let items = [];
      let selectedOffice = DEFAULT_CITY;
      let mode = "city";
      let nationalDay = "today";
      let nationalLayout = "map";

      const $ = (sel) => document.querySelector(sel);
      const escapeHtml = (s) =>
        String(s == null ? "" : s)
          .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;").replace(/'/g, "&#39;");

      function showErr(msg) { $("#err").innerHTML = '<div class="err">' + escapeHtml(msg) + "</div>"; }
      function clearErr() { $("#err").innerHTML = ""; }

      // ホスト側の getItems は ids も fields も無いと 200 件超で 400 を返す。
      // ビューが実際に読む列だけを ?fields= で渡して unselective limit を回避する。
      // (projectFields はキー名で射影するだけなので、schema 外の実フィールド
      // — centroid / geometry / periods / synopses 等 — もこのリストに列挙して OK。)
      const VIEW_FIELDS = [
        "office", "source", "date", "weekday", "summary",
        "weather", "weatherIcon", "min", "max", "pop", "popsByBand",
        "hourly",
        "wind", "wave", "overviewText", "archived",
        "chartType", "chartLabel", "validDateTime", "pngUrl",
        "areaCode", "areaName", "officeLabel", "publishingOffice", "reportDatetime",
        "centroid", "geometry", "periods", "synopses",
        "eventId", "typhoonName", "typhoonNameJa", "typhoonLabel",
        "forecastSerial", "forecastPoints",
        "warnings", "headlineText",
        "updatedAt",
      ];

      async function load() {
        try {
          const sep = dataUrl.includes("?") ? "&" : "?";
          const url = dataUrl + sep + "fields=" + VIEW_FIELDS.join(",");
          const res = await fetch(url, { headers: auth });
          if (!res.ok) throw new Error("HTTP " + res.status);
          const json = await res.json();
          items = json.items || [];
          clearErr();
          buildCityPicker();
          renderUpdated();
          highlightPrefectures();
          render();
        } catch (e) { showErr("データ読込に失敗: " + e.message); }
      }

      function buildCityPicker() {
        const sel = $("#city-picker");
        const offices = new Set(items.map((it) => it.office));
        sel.innerHTML = CITY_ORDER.map((c) => {
          const has = offices.has(c.office);
          const label = c.name + " (" + c.region + ")" + (has ? "" : " — 未取得");
          return '<option value="' + c.office + '"' + (has ? "" : " disabled") + '>' + escapeHtml(label) + '</option>';
        }).join("");
        sel.value = selectedOffice;
      }

      function renderUpdated() {
        const latest = items.filter((it) => it.updatedAt).map((it) => it.updatedAt).sort().pop();
        if (latest) {
          try {
            const d = new Date(latest);
            const hh = String(d.getHours()).padStart(2, "0");
            const mm = String(d.getMinutes()).padStart(2, "0");
            const mo = String(d.getMonth() + 1).padStart(2, "0");
            const dy = String(d.getDate()).padStart(2, "0");
            $("#updated").textContent = "更新 " + mo + "/" + dy + " " + hh + ":" + mm;
          } catch (e) {}
        }
      }

      function highlightPrefectures() {
        // national 9 都市の都道府県だけ少し明るく塗って、ニュース風に「対象地域」を示す
        const svg = $(".map-wrap svg");
        if (!svg) return;
        NATIONAL_CITIES.forEach((c) => {
          const g = svg.querySelector("." + c.pref);
          if (g) g.classList.add("highlight");
        });
      }

      function todayIso() {
        const d = new Date();
        const y = d.getFullYear();
        const m = String(d.getMonth() + 1).padStart(2, "0");
        const dd = String(d.getDate()).padStart(2, "0");
        return y + "-" + m + "-" + dd;
      }

      function recordsForOffice(office) {
        return items
          .filter((it) => it.office === office)
          .sort((a, b) => (a.date || "").localeCompare(b.date || ""));
      }

      function findRecord(office, dayLabel) {
        return recordsForOffice(office).find((r) => r.source === dayLabel);
      }

      function render() {
        // 台風タブ: 常時表示。active が居れば has-active クラスを付け、CSS で dim を解除する
        updateTyphoonTabVisibility();

        // 台風/天気図/波モードのときだけ body に class を付けて .app の幅制限を外す
        document.body.classList.toggle("mode-typhoon", mode === "typhoon");
        document.body.classList.toggle("mode-chart", mode === "chart");
        document.body.classList.toggle("mode-wave", mode === "wave");
        // 台風モード以外では再生タイマーを止める (空回しを防ぐ)
        if (mode !== "typhoon" && typeof stopTyphoonPlay === "function") stopTyphoonPlay();

        const hideAll = () => {
          $("#view-city").style.display = "none";
          $("#view-national").style.display = "none";
          $("#view-typhoon").style.display = "none";
          $("#view-chart").style.display = "none";
          $("#view-wave").style.display = "none";
        };

        if (mode === "city") {
          hideAll();
          $("#view-city").style.display = "";
          $("#city-picker-wrap").style.display = "";
          renderCity();
        } else if (mode === "typhoon") {
          hideAll();
          $("#view-typhoon").style.display = "";
          $("#city-picker-wrap").style.display = "none";
          renderTyphoon();
        } else if (mode === "chart") {
          hideAll();
          $("#view-chart").style.display = "";
          $("#city-picker-wrap").style.display = "none";
          renderChart();
        } else if (mode === "wave") {
          hideAll();
          $("#view-wave").style.display = "";
          $("#city-picker-wrap").style.display = "none";
          renderWave();
        } else {
          hideAll();
          $("#view-national").style.display = "";
          $("#city-picker-wrap").style.display = "none";
          renderNational();
        }
      }

      // ────────── 天気図モード (JMA 公式 PNG を表示するだけ) ──────────
      let chartType = "surface";

      function chartRecords() {
        return items.filter((r) => r.source === "chart");
      }

      function renderChart() {
        const recs = chartRecords().filter((r) => r.chartType === chartType);
        const rec = recs.find((r) => r.archived !== true) || recs[0];
        const frame = $("#chart-frame");
        if (!rec) {
          frame.innerHTML = '<div class="empty">天気図データ未取得</div>';
          return;
        }
        const validDisp = (rec.validDateTime || "").slice(0, 16).replace("T", " ");
        // JMA URL を直接使う (ローカルキャッシュは fetch.py が保存、見たいときは Finder で開ける)
        frame.innerHTML =
          '<img src="' + escapeHtml(rec.pngUrl || "") + '" alt="' + escapeHtml(rec.chartLabel || "") + '" loading="lazy" />' +
          '<div class="meta">' +
            escapeHtml(rec.chartLabel || "") + ' 対象 ' + escapeHtml(validDisp) + ' JST · ' +
            '出典: 気象庁 <a href="' + escapeHtml(rec.pngUrl || "") + '" target="_blank" rel="noopener">PNG</a>' +
          '</div>';
      }

      // (旧) 天気図用 Leaflet / 前線記号レンダリングは PNG 表示への切替で削除済み (2026-06-25)。
      // 履歴は git log を参照。再導入したい場合は VZSA50/VZSF50/VZSF51 XML パース付きで戻す。

      // ───── 旧ベクトル描画コード（CHART_FRONT_STYLE / front icons / renderChart Leaflet 版）を削除 (2026-06-25 PNG 表示化) ─────

      // ────────── 台風タブ ──────────
      function typhoonRecords() {
        return items.filter((r) => r.source === "typhoon");
      }
      function activeTyphoons() {
        return typhoonRecords().filter((r) => r.archived !== true);
      }

      function updateTyphoonTabVisibility() {
        // タブは常時表示。active な台風がいるかどうかで opacity だけ切り替える
        // (has-active クラスで CSS が dim を解除)。台風モード中も切り替えしない:
        // 終息直後を見ているところに勝手に画面が戻ると違和感があるため。
        const btn = $("#mode-typhoon");
        if (!btn) return;
        if (activeTyphoons().length > 0) {
          btn.classList.add("has-active");
        } else {
          btn.classList.remove("has-active");
        }
      }

      const TYPHOON_COLORS = ["#ff6b6b", "#74c0fc", "#ffd43b", "#69db7c", "#da77f2"];
      let _typhoonMap = null;
      let _typhoonLayer = null;
      let _typhoonBoundsFit = false;
      // 時刻スライドモード状態
      let typhoonTimeMode = "all"; // "all" | "single"
      let typhoonTimeIdx = 0;
      let typhoonTimes = []; // sorted ISO dt strings (union across active typhoons)
      let typhoonPlayTimer = null;
      let _typhoonControlsWired = false;

      function buildTyphoonTimes(typhoons) {
        const set = new Set();
        typhoons.forEach((t) => {
          (t.forecastPoints || []).forEach((p) => {
            if (p && p.dt && p.lat != null) set.add(p.dt);
          });
        });
        return Array.from(set).sort();
      }

      function formatTyphoonTimeLabel(dt) {
        if (!dt) return "—";
        // 2026-06-25T18:00:00+09:00 → "06/25 (木) 18:00 JST"
        const d = new Date(dt);
        if (isNaN(d.getTime())) return dt;
        const m = String(d.getMonth() + 1).padStart(2, "0");
        const day = String(d.getDate()).padStart(2, "0");
        const wd = ["日", "月", "火", "水", "木", "金", "土"][d.getDay()];
        const hh = String(d.getHours()).padStart(2, "0");
        const mm = String(d.getMinutes()).padStart(2, "0");
        return m + "/" + day + " (" + wd + ") " + hh + ":" + mm + " JST";
      }

      // 台風 forecastPoints 用の短い JST 時刻フォーマット ("MM/DD HH:mm")。
      // 地図のラベルタグ・サイドテーブルなど、「２４時間後」を置き換える狭い場所で使う。
      function formatTyphoonTimeShort(dt) {
        if (!dt) return "—";
        const d = new Date(dt);
        if (isNaN(d.getTime())) return dt;
        const m = String(d.getMonth() + 1).padStart(2, "0");
        const day = String(d.getDate()).padStart(2, "0");
        const hh = String(d.getHours()).padStart(2, "0");
        const mm = String(d.getMinutes()).padStart(2, "0");
        return m + "/" + day + " " + hh + ":" + mm;
      }

      function wireTyphoonControls() {
        if (_typhoonControlsWired) return;
        _typhoonControlsWired = true;

        document.querySelectorAll('.typhoon-toolbar [data-tmode]').forEach((btn) => {
          btn.addEventListener("click", () => {
            const m = btn.getAttribute("data-tmode");
            typhoonTimeMode = m;
            document.querySelectorAll('.typhoon-toolbar [data-tmode]').forEach((b) =>
              b.classList.toggle("active", b === btn)
            );
            $("#typhoon-time-controls").style.display = (m === "single") ? "flex" : "none";
            stopTyphoonPlay();
            renderTyphoon();
          });
        });

        $("#typhoon-slider").addEventListener("input", (e) => {
          typhoonTimeIdx = parseInt(e.target.value, 10) || 0;
          stopTyphoonPlay();
          renderTyphoon();
        });

        $("#typhoon-play").addEventListener("click", () => {
          if (typhoonPlayTimer) {
            stopTyphoonPlay();
          } else {
            startTyphoonPlay();
          }
        });
      }

      function startTyphoonPlay() {
        if (!typhoonTimes.length) return;
        $("#typhoon-play").textContent = "❚❚";

        // 再生開始前に「始点〜終点の全経路」が地図に収まるよう自動でズーム/パン。
        // アニメ中はマップを動かさないので、ここで一度だけ合わせる。
        const fullBounds = [];
        for (const t of typhoonRecords()) {
          if (t.archived) continue;
          for (const p of (t.forecastPoints || [])) {
            if (p && p.lat != null && p.lng != null) fullBounds.push([p.lat, p.lng]);
          }
        }
        if (fullBounds.length && _typhoonMap) {
          _typhoonMap.fitBounds(fullBounds, { padding: [50, 50], animate: true });
        }

        // 始点 (time index 0) に巻き戻してから再生
        typhoonTimeIdx = 0;
        $("#typhoon-slider").value = 0;
        renderTyphoon();

        // Leaflet の zoom アニメは ~250ms。終わってから interval を開始してチラつきを抑える。
        const ZOOM_ANIM_WAIT_MS = 400;
        typhoonPlayTimer = setTimeout(() => {
          typhoonPlayTimer = setInterval(() => {
            typhoonTimeIdx = (typhoonTimeIdx + 1) % typhoonTimes.length;
            $("#typhoon-slider").value = typhoonTimeIdx;
            renderTyphoon();
            if (typhoonTimeIdx === typhoonTimes.length - 1) {
              // 最後で 1.5 秒余韻あと停止
              setTimeout(stopTyphoonPlay, 1500);
            }
          }, 1200);
        }, ZOOM_ANIM_WAIT_MS);
      }

      function stopTyphoonPlay() {
        if (typhoonPlayTimer) {
          clearInterval(typhoonPlayTimer);
          typhoonPlayTimer = null;
        }
        const btn = $("#typhoon-play");
        if (btn) btn.textContent = "▶";
      }

      function renderTyphoon() {
        wireTyphoonControls();

        const typhoons = typhoonRecords().sort((a, b) => {
          // active first, then by number desc
          if ((a.archived === true) !== (b.archived === true)) return a.archived ? 1 : -1;
          return (b.typhoonNumber || "").localeCompare(a.typhoonNumber || "");
        });
        const activeCount = typhoons.filter((t) => t.archived !== true).length;

        // 「活動中の台風なし」のときの empty overlay
        // (active がいないだけ、archived 台風は side panel に残す)
        const mapEl = $("#typhoon-map");
        let emptyEl = document.getElementById("typhoon-empty");
        if (mapEl && !emptyEl) {
          emptyEl = document.createElement("div");
          emptyEl.id = "typhoon-empty";
          emptyEl.className = "typhoon-empty";
          emptyEl.innerHTML =
            '<div class="icon">🌀</div>' +
            '<div class="msg">台風はありません</div>' +
            '<div class="sub">気象庁が VPTW (台風解析・予報情報) を発番すると地図に表示されます</div>';
          mapEl.appendChild(emptyEl);
        }
        if (emptyEl) emptyEl.style.display = activeCount === 0 ? "flex" : "none";

        // toolbar (時刻スライド) は active がいるときだけ意味があるので隠す
        const toolbar = document.querySelector(".typhoon-toolbar");
        if (toolbar) toolbar.style.display = activeCount > 0 ? "flex" : "none";

        // 時刻スライダー: union of dts across active typhoons (archived は含めない方が自然)
        typhoonTimes = buildTyphoonTimes(typhoons.filter((t) => t.archived !== true));
        const slider = $("#typhoon-slider");
        const label = $("#typhoon-time-label");
        if (slider) {
          slider.min = 0;
          slider.max = Math.max(0, typhoonTimes.length - 1);
          if (typhoonTimeIdx >= typhoonTimes.length) typhoonTimeIdx = Math.max(0, typhoonTimes.length - 1);
          slider.value = typhoonTimeIdx;
          slider.disabled = typhoonTimes.length === 0;
          $("#typhoon-play").disabled = typhoonTimes.length === 0;
        }
        const currentTime = typhoonTimes[typhoonTimeIdx] || null;
        if (label) {
          if (typhoonTimeMode === "single" && currentTime) {
            // 実況時刻と一致するときだけ "実況" バッジを付ける。それ以外は JST 時刻のみ。
            const liveDt = typhoons.find((t) => t.archived !== true)?.forecastPoints?.find((p) => p.dtType === "実況")?.dt;
            const suffix = (liveDt && new Date(currentTime).getTime() === new Date(liveDt).getTime()) ? " (実況)" : "";
            label.textContent = formatTyphoonTimeLabel(currentTime) + suffix;
          } else {
            label.textContent = "全期間表示";
          }
        }

        // 地図初期化 (1 回だけ)
        if (!_typhoonMap) {
          _typhoonMap = L.map("typhoon-map").setView([22, 134], 4);
          // 基盤層: CartoDB Positron (薄グレー、global) を一番下に。
          //   GSI 淡色地図は Japan 周辺しかカバーがなく、太平洋熱帯域 (台風の南側) で
          //   タイル 404 が起きるので、その下に薄く global を敷いておく
          L.tileLayer("https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png", {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright" target="_blank">OSM</a> &copy; <a href="https://carto.com/attributions" target="_blank">CARTO</a>',
            maxZoom: 12,
            opacity: 0.65,
          }).addTo(_typhoonMap);
          // 主層: 国土地理院 淡色地図 (Japan 中心、道路を薄め、都道府県・主要都市名が残る)
          //   https://maps.gsi.go.jp/development/ichiran.html#pale
          L.tileLayer("https://cyberjapandata.gsi.go.jp/xyz/pale/{z}/{x}/{y}.png", {
            attribution: '<a href="https://maps.gsi.go.jp/development/ichiran.html" target="_blank" rel="noopener">地理院タイル (淡色)</a>',
            maxZoom: 18,
            minZoom: 2,
          }).addTo(_typhoonMap);
          const legend = L.control({ position: "bottomleft" });
          legend.onAdd = function () {
            const div = L.DomUtil.create("div", "typhoon-legend");
            div.innerHTML =
              '<div><span class="sw" style="background:rgba(252,196,25,0.25);border-color:#f59f00"></span>強風域 (15 m/s 以上)</div>' +
              '<div><span class="sw" style="background:rgba(250,82,82,0.3);border-color:#c92a2a"></span>暴風域 (25 m/s 以上)</div>' +
              '<div><span class="sw" style="background:transparent;border:1px dashed #e03131"></span>暴風警戒域 (予報)</div>' +
              '<div><span class="sw" style="background:rgba(120,120,120,0.18);border-color:#666"></span>予報円 (70%)</div>';
            return div;
          };
          legend.addTo(_typhoonMap);
        }
        if (_typhoonLayer) _typhoonLayer.remove();
        _typhoonLayer = L.layerGroup().addTo(_typhoonMap);

        const allBounds = [];

        typhoons.forEach((t, idx) => {
          // 終息した台風は地図に描画しない (サイドパネルには「終息」だけ残す)
          if (t.archived) return;
          const color = TYPHOON_COLORS[idx % TYPHOON_COLORS.length];
          const allPoints = (t.forecastPoints || []).filter((p) => p && p.lat != null && p.lng != null);
          if (!allPoints.length) return;

          // 時刻モード別の対象点を決める:
          //   all:    全点描画 + 全期間の中心ライン
          //   single: currentTime と一致する点だけ描画 + 始点〜currentTime までの中心ライン
          let pointsToDraw, lineCoords;
          if (typhoonTimeMode === "single" && currentTime) {
            pointsToDraw = allPoints.filter((p) => p.dt === currentTime);
            // ライン: 始点〜currentTime まで (currentTime の点を含む)
            const cutIdx = allPoints.findIndex((p) => p.dt === currentTime);
            lineCoords = (cutIdx >= 0 ? allPoints.slice(0, cutIdx + 1) : allPoints).map((p) => [p.lat, p.lng]);
          } else {
            pointsToDraw = allPoints;
            lineCoords = allPoints.map((p) => [p.lat, p.lng]);
          }

          // fitBounds 用 (常に全期間で取る、スライド中も視点を動かさない)
          allPoints.forEach((p) => allBounds.push([p.lat, p.lng]));

          // 中心ライン (始点〜現在対象まで)
          if (lineCoords.length >= 2) {
            L.polyline(lineCoords, {
              color, weight: 2, dashArray: "6 4", opacity: t.archived ? 0.35 : 0.85,
            }).addTo(_typhoonLayer);
          }

          pointsToDraw.forEach((p) => {
            const isNow = p.dtType === "実況";
            const dim = t.archived ? 0.4 : 1;
            // 強風域 (実況のみ)
            if (p.strong_radius_km) {
              L.circle([p.lat, p.lng], { radius: p.strong_radius_km * 1000, color: "#f59f00", fillColor: "#fcc419", fillOpacity: 0.18 * dim, weight: 1, opacity: dim }).addTo(_typhoonLayer);
            }
            // 暴風域
            if (p.storm_radius_km) {
              L.circle([p.lat, p.lng], { radius: p.storm_radius_km * 1000, color: "#c92a2a", fillColor: "#fa5252", fillOpacity: 0.25 * dim, weight: 1, opacity: dim }).addTo(_typhoonLayer);
            }
            // 予報円
            if (p.forecast_radius_km && !isNow) {
              L.circle([p.lat, p.lng], { radius: p.forecast_radius_km * 1000, color, fillColor: color, fillOpacity: 0.10 * dim, weight: 1.5, opacity: dim }).addTo(_typhoonLayer);
            }
            // 暴風警戒域
            if (p.storm_warning_radius_km) {
              L.circle([p.lat, p.lng], { radius: p.storm_warning_radius_km * 1000, color: "#e03131", weight: 1, dashArray: "4 4", fill: false, opacity: dim }).addTo(_typhoonLayer);
            }
            // 中心マーカー
            const m = L.circleMarker([p.lat, p.lng], {
              radius: isNow ? 8 : 5,
              color, weight: 2,
              fillColor: isNow ? color : "#fff", fillOpacity: dim,
            }).addTo(_typhoonLayer);
            m.bindPopup(
              "<b style=\"color:" + color + "\">" + escapeHtml(t.typhoonLabel || t.eventId) + " " + escapeHtml(t.typhoonNameJa || t.typhoonName || "") + "</b><br>" +
              (isNow ? "実況 — " : "予報 — ") + escapeHtml(formatTyphoonTimeShort(p.dt)) + " JST<br>" +
              "中心: " + p.lat + "°N, " + p.lng + "°E<br>" +
              (p.pressure_hpa ? "中心気圧: " + p.pressure_hpa + " hPa<br>" : "") +
              (p.wind_max_ms ? "最大風速: " + p.wind_max_ms + " m/s (瞬間 " + (p.wind_gust_ms || "—") + " m/s)<br>" : "") +
              (p.moveDir ? "進行: " + escapeHtml(p.moveDir) + (p.moveKmh ? " " + p.moveKmh + " km/h" : "") + "<br>" : "") +
              "階級: " + escapeHtml(p.cls || "—")
            );
            // ラベル
            L.marker([p.lat, p.lng], {
              icon: L.divIcon({
                className: "typhoon-label-tag-wrap",
                iconSize: null,
                iconAnchor: [-10, 8],
                html: '<span class="typhoon-label-tag" style="color:' + color + ';border-color:' + color + ';opacity:' + dim + '">' +
                      escapeHtml(isNow ? "実況 " + formatTyphoonTimeShort(p.dt) : formatTyphoonTimeShort(p.dt)) + "<br>" + (p.pressure_hpa || "—") + "hPa</span>",
              }),
              interactive: false,
              keyboard: false,
            }).addTo(_typhoonLayer);
            // 範囲は allPoints 側で先に集めているので、ここでは push しない
          });
        });

        // 初回のみ fitBounds (以降は scrubbing で視点を維持)
        if (allBounds.length && !_typhoonBoundsFit) {
          _typhoonMap.fitBounds(allBounds, { padding: [40, 40] });
          _typhoonBoundsFit = true;
        }
        setTimeout(() => _typhoonMap.invalidateSize(), 80);

        // ────────── サイドパネル ──────────
        const side = $("#typhoon-side");
        if (!typhoons.length) {
          // map 側の overlay と二重にならないよう、side はシンプルに
          side.innerHTML = '<div class="dim" style="text-align:center; padding:20px 8px">直近の台風履歴はありません</div>';
          return;
        }
        let html = "";
        typhoons.forEach((t, idx) => {
          const color = TYPHOON_COLORS[idx % TYPHOON_COLORS.length];
          const archived = t.archived === true;
          // 終息台風はクリックで動かす対象がないので data-event-id を付けない (= h3 ホバー / クリック不活性)
          // archived は見出しに「終息」バッジを付け、forecastPoints テーブルは省略する
          const h3Attrs = archived
            ? 'style="color:' + color + '; cursor:default"'
            : 'style="color:' + color + '" data-event-id="' + escapeHtml(t.eventId || "") + '" title="クリックで地図を現在地に移動"';
          // dissipated は JMA 仕様 No.11902 の最終報シグナル (実況のみ + cls=温帯/熱帯低気圧)。
          // archived とは独立で、"JMA 公式に終息宣言が出ている" ことを示す。
          // archived+dissipated = 終息報が出てから 6h+ 経過、archived のみ = 12h+ 鮮度なし、
          // dissipated のみ = 終息報が出てから 6h 以内 (まだ実況を強調表示)
          const dissipated = t.dissipated === true;
          const dissipationLabel = dissipated && t.dissipationKind
            ? "終息（" + t.dissipationKind + "）"
            : "終息";
          html += '<h3 ' + h3Attrs + '>' +
            escapeHtml(t.typhoonLabel || t.eventId) + " " + escapeHtml(t.typhoonNameJa || t.typhoonName || "") +
            (archived ? '<span class="archived-tag">' + escapeHtml(dissipationLabel) + '</span>' :
              (dissipated ? '<span class="dissipating-tag">' + escapeHtml(dissipationLabel) + '</span>' : "")) +
            '</h3>';
          if (archived) {
            // 詳細情報は出さない。最終発表時刻だけ薄く残す。
            html += '<div class="dim" style="margin-bottom:10px; font-size:11px">' +
              '最終発表 ' + escapeHtml((t.reportDatetime || "").slice(0, 16).replace("T", " ")) +
              '</div>';
            return;
          }
          const points = (t.forecastPoints || []).filter((p) => p && p.lat != null);
          const rows = points.map((p) =>
            '<tr><td>' + escapeHtml(formatTyphoonTimeShort(p.dt)) + (p.dtType === "実況" ? '<br><span class="dim">実況</span>' : '') + '</td>' +
            '<td>' + (p.lat != null ? p.lat + "°N<br><span class=\"dim\">" + p.lng + "°E</span>" : "—") + '</td>' +
            '<td>' + (p.pressure_hpa || "—") + '<br><span class="dim">' + (p.wind_max_ms || 0) + "m/s</span></td>" +
            '<td>' + (p.forecast_radius_km ? p.forecast_radius_km : (p.strong_radius_km ? "強" + p.strong_radius_km : "—")) +
              (p.storm_warning_radius_km ? '<br><span style="color:#ff8888">警' + p.storm_warning_radius_km + "</span>" : "") +
            '</td></tr>'
          ).join("");
          html += '<div class="dim" style="margin-bottom:6px">' + escapeHtml((t.reportDatetime || "").slice(0, 16).replace("T", " ")) +
            (t.forecastSerial != null ? " · 第" + t.forecastSerial + "号" : "") + '</div>' +
            '<table><tr><th>時刻</th><th>中心</th><th>気圧/風</th><th>半径km</th></tr>' + rows + '</table>';
        });
        html += '<div class="typhoon-source">出典: 気象庁 防災情報XML (VPTW 台風解析・予報情報) — ' +
          '<a href="https://www.data.jma.go.jp/developer/xml/feed/extra_l.xml" target="_blank" rel="noopener">extra_l.xml</a> ' +
          '（最大 5 日予報。最新発表は <a href="https://www.data.jma.go.jp/developer/xml/feed/extra.xml" target="_blank" rel="noopener">extra.xml</a>）。' +
          '判定: 最新 VPTW が「実況のみ + 熱帯擾乱種類=温帯/熱帯低気圧」なら ' +
          '<a href="https://www.data.jma.go.jp/suishin/shiyou/pdf/no11902" target="_blank" rel="noopener">仕様 No.11902</a> の最終報として終息扱い、' +
          'それ以外は直近 12 時間以内に発表があれば活動中。</div>';
        side.innerHTML = html;

        // 見出しクリックでその台風の「いま選択している時刻」の位置に地図ジャンプ。
        // 優先順位:
        //  1. スライダーの currentTime (single モード) と dt 一致する点
        //  2. 実況点
        //  3. forecastPoints の先頭点
        const typhoonByEvent = new Map();
        for (const t of typhoons) {
          if (t.eventId) typhoonByEvent.set(t.eventId, t);
        }
        side.querySelectorAll("h3[data-event-id]").forEach((h) => {
          h.addEventListener("click", () => {
            const eid = h.getAttribute("data-event-id");
            const t = typhoonByEvent.get(eid);
            if (!t || !_typhoonMap) return;
            const pts = (t.forecastPoints || []).filter((p) => p && p.lat != null && p.lng != null);
            if (!pts.length) return;
            const slideTime = (typhoonTimeMode === "single") ? (typhoonTimes[typhoonTimeIdx] || null) : null;
            let target = null;
            if (slideTime) {
              const t1 = new Date(slideTime).getTime();
              target = pts.find((p) => p.dt && new Date(p.dt).getTime() === t1);
            }
            if (!target) target = pts.find((p) => p.dtType === "実況");
            if (!target) target = pts[0];
            const targetZoom = Math.max(_typhoonMap.getZoom(), 6);
            _typhoonMap.setView([target.lat, target.lng], targetZoom, { animate: true });
          });
        });
      }

      function renderWarningBar(rec) {
        const el = $("#warning-bar");
        const cityEl = $("#view-city");
        if (!el) return;
        if (!rec) {
          el.style.display = "none";
          if (cityEl) cityEl.classList.remove("has-warning");
          return;
        }
        const active = Array.isArray(rec.warnings) ? rec.warnings : [];
        // headlineText (「注意報を解除します。」等) はバーには表示しない — ピル状態で十分
        if (!active.length) {
          el.style.display = "none";
          if (cityEl) cityEl.classList.remove("has-warning");
          return;
        }
        if (cityEl) cityEl.classList.add("has-warning");
        // 発表時刻を "MM/DD HH:mm" に整形
        let timeDisp = "";
        if (rec.reportDatetime) {
          try {
            const d = new Date(rec.reportDatetime);
            const mm = ("0" + (d.getMonth() + 1)).slice(-2);
            const dd = ("0" + d.getDate()).slice(-2);
            const hh = ("0" + d.getHours()).slice(-2);
            const mi = ("0" + d.getMinutes()).slice(-2);
            timeDisp = `${mm}/${dd} ${hh}:${mi}`;
          } catch (e) { /* ignore */ }
        }
        const pubOffice = escapeHtml(rec.publishingOffice || "");

        // active.length > 0 が保証されているのでピル必須
        const pillsHtml = active.map((w) =>
          '<span class="warn-pill level-' + escapeHtml(w.level || "advisory") + '">' +
            escapeHtml(w.name || w.code || "") +
          '</span>'
        ).join("");

        const metaHtml = (pubOffice || timeDisp)
          ? '<span class="meta">' +
              (pubOffice ? pubOffice : "") +
              (pubOffice && timeDisp ? " · " : "") +
              (timeDisp ? "発表 " + timeDisp : "") +
            '</span>'
          : "";

        el.innerHTML =
          '<span class="lab">⚠️ 警報情報</span>' +
          pillsHtml +
          metaHtml;
        el.style.display = "";
        el.classList.toggle("has-special", active.some((w) => w.level === "special"));
        el.classList.toggle("has-warning", active.some((w) => w.level === "warning"));
      }

      function renderCity() {
        const recs = recordsForOffice(selectedOffice);
        const today = recs.find((r) => r.source === "today");
        const tomorrow = recs.find((r) => r.source === "tomorrow");
        const weekly = recs.filter((r) => r.date >= todayIso()).slice(0, 7);
        const warningRec = recs.find((r) => r.source === "warning");

        renderWarningBar(warningRec);

        $("#hero").innerHTML = "";
        if (today) $("#hero").innerHTML += renderHero(today, "今日");
        if (tomorrow) $("#hero").innerHTML += renderHero(tomorrow, "明日");
        if (!today && !tomorrow) {
          $("#hero").innerHTML = '<div class="empty"><div class="icon">⛅</div>選択した地域の予報はまだ取得されていません。</div>';
        }
        $("#weekly-grid").innerHTML = weekly.length ? weekly.map(renderWeekDay).join("") : "";

        const overviewRec = today || recs.find((r) => r.overviewText);
        if (overviewRec && overviewRec.overviewText) {
          $("#overview").style.display = "";
          $("#overview-text").textContent = overviewRec.overviewText;
          $("#view-city").classList.add("has-overview");
        } else {
          $("#overview").style.display = "none";
          $("#view-city").classList.remove("has-overview");
        }
      }

      // JMA 5:00 発表では今日の temps が [09:00, 00:00] で同じ値を重複させる仕様。
      // min == max のときは 1 値だけ表示する。
      function renderHeroTemp(min, max) {
        if (!min && !max) return '<div class="temp"></div>';
        if (!min || min === max) {
          return '<div class="temp"><span class="max">' + escapeHtml(max || min) + '<span class="unit">℃</span></span></div>';
        }
        if (!max) {
          return '<div class="temp"><span class="max">' + escapeHtml(min) + '<span class="unit">℃</span></span></div>';
        }
        return '<div class="temp">' +
          '<span class="max">' + escapeHtml(max) + '<span class="unit">℃</span></span>' +
          '<span class="min">/ ' + escapeHtml(min) + '<span class="unit">℃</span></span>' +
        '</div>';
      }

      function renderListTemp(min, max, pop) {
        const popHtml = pop ? '<span class="pop">☔ ' + escapeHtml(pop) + '%</span>' : "";
        if (!min && !max) {
          return '<div class="temp-pop"><span class="temp-max">—</span>' + popHtml + '</div>';
        }
        if (!min || min === max) {
          return '<div class="temp-pop"><span class="temp-max">' + escapeHtml(max || min) + '°</span>' + popHtml + '</div>';
        }
        if (!max) {
          return '<div class="temp-pop"><span class="temp-max">' + escapeHtml(min) + '°</span>' + popHtml + '</div>';
        }
        return '<div class="temp-pop">' +
          '<span class="temp-max">' + escapeHtml(max) + '°</span>' +
          '<span class="temp-min">/ ' + escapeHtml(min) + '°</span>' +
          popHtml +
        '</div>';
      }

      function renderPinTemp(min, max) {
        if (!min && !max) return '<div class="pin-temp">—</div>';
        if (!min || min === max) {
          return '<div class="pin-temp">' + escapeHtml(max || min) + '</div>';
        }
        if (!max) return '<div class="pin-temp">' + escapeHtml(min) + '</div>';
        return '<div class="pin-temp">' + escapeHtml(max) + '<span class="min">/' + escapeHtml(min) + '</span></div>';
      }

      function renderHero(r, tag) {
        const icon = r.weatherIcon || "—";
        const date = (r.date || "").slice(5).replace("-", "/");
        const weather = escapeHtml(r.weather || "");
        const max = r.max || "—";
        const min = r.min || "—";
        const pop = r.pop || "—";
        const bands = (r.popsByBand || "").split(" / ").filter(Boolean);
        let bandsHtml = "";
        if (bands.length) {
          bandsHtml = '<div class="pops-bar">' + bands.map((b) => {
            const m = b.match(/^(\d{2}-\d{2}):\s*(\d+)%$/);
            if (!m) return "";
            return '<div class="band"><div class="band-label">' + m[1] + '</div><div class="band-val">' + m[2] + '%</div></div>';
          }).join("") + "</div>";
        }
        // 3 時間ごとストリップ (地域時系列予報)
        let hourlyHtml = "";
        if (Array.isArray(r.hourly) && r.hourly.length) {
          hourlyHtml = '<div class="hourly-strip">' + r.hourly.map((h) =>
            '<div class="h-cell">' +
              '<div class="h-time">' + escapeHtml(h.time || "") + '</div>' +
              '<div class="h-icon">' + (h.weatherIcon || "—") + '</div>' +
              '<div class="h-temp">' + escapeHtml(h.temp || "—") + '°</div>' +
              (h.windDir ? '<div class="h-wind">' + escapeHtml(h.windDir) + '</div>' : '<div class="h-wind">&nbsp;</div>') +
            '</div>'
          ).join("") + '</div>';
        }
        return '' +
          '<div class="hero-card">' +
            '<div class="tag">' + escapeHtml(tag) + ' ・ ' + escapeHtml(r.weekday || "") + '</div>' +
            '<div class="date">' + escapeHtml(date) + '</div>' +
            '<div class="main">' +
              '<div class="icon-big">' + icon + '</div>' +
              '<div class="weather-text">' + weather + '</div>' +
            '</div>' +
            renderHeroTemp(min, max) +
            '<dl class="meta">' +
              '<dt>降水確率</dt><dd>' + escapeHtml(pop) + '%</dd>' +
              (r.wind ? '<dt>風</dt><dd>' + escapeHtml(r.wind) + '</dd>' : "") +
              (r.wave ? '<dt>波</dt><dd>' + escapeHtml(r.wave) + '</dd>' : "") +
            '</dl>' +
            hourlyHtml +
            bandsHtml +
          '</div>';
      }

      function renderWeekDay(r) {
        const dateShort = (r.date || "").slice(5);
        const wd = r.weekday || "";
        const isToday = r.source === "today";
        const klass = "week-day" +
          (isToday ? " is-today" : "") +
          (wd === "土" ? " weekend-sat" : wd === "日" ? " weekend-sun" : "");
        return '' +
          '<div class="' + klass + '">' +
            '<div class="wd">' + escapeHtml(wd) + '</div>' +
            '<div class="md">' + escapeHtml(dateShort) + '</div>' +
            '<div class="icon">' + (r.weatherIcon || "—") + '</div>' +
            renderWeekTemps(r.min, r.max) +
            (r.pop ? '<div class="pop">' + escapeHtml(r.pop) + '%</div>' : '<div class="pop">&nbsp;</div>') +
          '</div>';
      }

      function renderWeekTemps(min, max) {
        if (!min && !max) return '<div class="temps"><span class="temp-max">—</span></div>';
        if (!min || min === max) {
          return '<div class="temps"><span class="temp-max">' + escapeHtml(max || min) + '</span></div>';
        }
        if (!max) {
          return '<div class="temps"><span class="temp-max">' + escapeHtml(min) + '</span></div>';
        }
        return '<div class="temps">' +
          '<span class="temp-max">' + escapeHtml(max) + '</span>' +
          ' / <span class="temp-min">' + escapeHtml(min) + '</span>' +
        '</div>';
      }

      function renderNational() {
        if (nationalLayout === "map") {
          $("#map-wrap").style.display = "";
          $("#national-grid").style.display = "none";
          // SVG レイアウト完了を待つ
          requestAnimationFrame(() => requestAnimationFrame(renderMap));
        } else {
          $("#map-wrap").style.display = "none";
          $("#national-grid").style.display = "";
          renderList();
        }
      }

      function getPinPosition(c, svgEl, wrapEl) {
        const g = svgEl.querySelector("." + c.pref);
        if (!g) return null;
        const gRect = g.getBoundingClientRect();
        const wrapRect = wrapEl.getBoundingClientRect();
        if (!gRect.width || !wrapRect.width) return null;
        const xPx = (gRect.x - wrapRect.x) + gRect.width * c.xPct;
        const yPx = (gRect.y - wrapRect.y) + gRect.height * c.yPct;
        return {
          xPct: (xPx / wrapRect.width) * 100,
          yPct: (yPx / wrapRect.height) * 100,
        };
      }

      // ────────── 海上予報モード (地方海上予報) ──────────
      //   データは bosai/seawarning/data/forecast/<office>.json 由来。
      //   1 レコード = 1 海域 (areaCode 4桁) で、periods に「今日 / 明日」の wind/wave/weather を含む。
      //   各レコードに JMA の海域ポリゴン (geometry) も埋め込み済み (fetch_marine.py)。
      //   表示は Leaflet + 国土地理院 淡色 + 波高色塗りポリゴン。

      // 波高色段階 (1m 刻み、7 段)
      //   bin 0: <1m, bin 1: 1〜2m, ..., bin 6: ≥6m
      //   各 bin に Leaflet ポリゴン style とラベル/サイドパネル用 text 色をまとめている。
      //   未取得 (maxM == null) のときは bin = -1 (下記の WAVE_UNKNOWN を返す)
      const WAVE_BINS = [
        { upper:  1, fill: "#4cb6ff", stroke: "#7ad0ff", fillOpacity: 0.22, weight: 1.0, text: "var(--cool)", label: "&lt; 1m" },
        { upper:  2, fill: "#5fa8e8", stroke: "#88c8f0", fillOpacity: 0.32, weight: 1.0, text: "#a8d8ff",     label: "1〜2m" },
        { upper:  3, fill: "#5dc8c4", stroke: "#88e0dc", fillOpacity: 0.38, weight: 1.1, text: "#a8efec",     label: "2〜3m" },
        { upper:  4, fill: "#f4d35e", stroke: "#ffe082", fillOpacity: 0.40, weight: 1.2, text: "#ffe8a0",     label: "3〜4m (やや高)" },
        { upper:  5, fill: "#f4a261", stroke: "#ffb84d", fillOpacity: 0.42, weight: 1.3, text: "#ffd089",     label: "4〜5m" },
        { upper:  6, fill: "#e76f51", stroke: "#ff8866", fillOpacity: 0.45, weight: 1.4, text: "#ffaa92",     label: "5〜6m (高)" },
        { upper: Infinity, fill: "#e63946", stroke: "#ff5252", fillOpacity: 0.50, weight: 1.6, text: "#ff8a8a", label: "≥ 6m (非常に高)" },
      ];
      const WAVE_UNKNOWN = { fill: "#3a78bf", stroke: "#5fa8e8", fillOpacity: 0.20, weight: 1, text: "var(--text-dim)", label: "不明" };

      // 数値 → bin オブジェクト (含まれる bin を返す。null は WAVE_UNKNOWN)
      function waveBin(maxM) {
        if (maxM == null) return WAVE_UNKNOWN;
        for (const b of WAVE_BINS) {
          if (maxM < b.upper) return b;
        }
        return WAVE_BINS[WAVE_BINS.length - 1];
      }

      // ラベル要素に付けるクラス (CSS で背景濃度を出すために bin index が必要)
      function waveCssClass(maxM) {
        if (maxM == null) return "";
        const idx = WAVE_BINS.indexOf(waveBin(maxM));
        return idx >= 0 ? "wc-" + idx : "";
      }

      // 方位を短い英字に
      const DIR_TO_EN = {
        "北": "N", "北北東": "NNE", "北東": "NE", "東北東": "ENE",
        "東": "E", "東南東": "ESE", "南東": "SE", "南南東": "SSE",
        "南": "S", "南南西": "SSW", "南西": "SW", "西南西": "WSW",
        "西": "W", "西北西": "WNW", "北西": "NW", "北北西": "NNW",
      };

      // ラベル間引き: ピクセル距離が threshold 未満で重なる場合、波高の低い方を隠す。
      // ズーム/パン変更ごとに呼び出される。show-detail (zoom >= 6) のときは間引きなし。
      function thinLabels() {
        if (!_waveMap || !_waveLabelMarkers.length) return;
        const z = _waveMap.getZoom();
        // 詳細モードでは全表示
        if (z >= 6) {
          _waveLabelMarkers.forEach(({ marker }) => {
            const el = marker.getElement();
            if (el) el.style.display = "";
          });
          return;
        }
        // ズームレベルに応じた距離閾値 (zoom が大きいほど閾値小)
        // zoom 3: 100px, 4: 80px, 5: 65px
        const threshold = z >= 5 ? 65 : (z >= 4 ? 80 : 100);
        // 波高降順 (高い海域を必ず残す)
        const sorted = _waveLabelMarkers.slice().sort((a, b) => b.priority - a.priority);
        const placed = [];
        for (const { marker } of sorted) {
          const el = marker.getElement();
          if (!el) continue;
          const pt = _waveMap.latLngToContainerPoint(marker.getLatLng());
          let collide = false;
          for (const p of placed) {
            if (Math.hypot(pt.x - p.x, pt.y - p.y) < threshold) { collide = true; break; }
          }
          if (collide) {
            el.style.display = "none";
          } else {
            el.style.display = "";
            placed.push(pt);
          }
        }
      }

      // ポリゴンの色 (Leaflet style プロパティ) — waveBin から派生
      function waveStyle(maxM) {
        const b = waveBin(maxM);
        return { fillColor: b.fill, color: b.stroke, fillOpacity: b.fillOpacity, weight: b.weight };
      }

      // 長い海域名はピン上で短縮 (「及び/付近」以降を切る)。全文はサイドパネルに残る。
      function shortAreaName(name) {
        if (!name) return "";
        let s = name;
        const i = s.indexOf("及び");
        if (i > 0) s = s.slice(0, i);
        return s;
      }

      // 風の生テキストから「方位」「ノット」「m/s」を分解抽出 (ピンに縦並びで表示するため)
      // 例: "豊後および紀伊水道を除く海域で 北東 30ノット（15メートル）..."
      //   → { dir: "NE", knot: "30kt", ms: "15m/s" }
      // 全角数字は半角化、見つからなければ null。
      function compactWind(windLines, primaryDir) {
        const dirEn = primaryDir ? (DIR_TO_EN[primaryDir] || primaryDir) : null;
        const out = { dir: dirEn, knot: null, ms: null };
        if (!windLines || !windLines.length) return out;
        const norm = String(windLines[0]).replace(/[０-９]/g, (c) =>
          String.fromCharCode(c.charCodeAt(0) - 0xFF10 + 0x30));
        // primaryDir の直後フレーズを優先
        let target = norm;
        if (primaryDir && norm.indexOf(primaryDir) >= 0) {
          target = norm.slice(norm.indexOf(primaryDir) + primaryDir.length);
        }
        const mk = target.match(/(\d+)\s*ノット/);
        if (mk) out.knot = mk[1] + "kt";
        const mm = target.match(/(\d+)\s*メートル/);
        if (mm) out.ms = mm[1] + "m/s";
        return out;
      }

      // synopses をオフィス横断で dedupe
      function dedupeSynopses(records) {
        const seen = new Set();
        const out = [];
        for (const r of records) {
          for (const s of (r.synopses || [])) {
            const k = s.replace(/\s+/g, " ").trim();
            if (!k || seen.has(k)) continue;
            seen.add(k);
            out.push(s);
          }
        }
        return out;
      }

      let waveDay = "今日";  // JMA の period 名そのまま
      let _waveMap = null;
      let _waveLayer = null;
      let _waveFitted = false;
      let _waveLabelMarkers = [];  // ズームに応じた間引き対象 {marker, priority}

      // 全 37 海域を表示する。
      // 除外したい海域があれば下記 set に areaCode を追加 (ポリゴンとラベル両方が消える)。
      const MARINE_DROP_CODES = new Set([
        // 例: "1010" を入れるとサハリン東方海上を非表示
      ]);

      function marineRecords() {
        return items.filter((it) =>
          it.source === "marine" && !MARINE_DROP_CODES.has(it.areaCode)
        );
      }

      // 海上予報の period 名はJMAが時刻帯によって "今日"/"明日"/"今日から明日"/"明後日" と変える。
      // 実データから period 名を拾い、day-tab をその場で組み立てる。
      function syncWaveDayTabs(recs) {
        const tabsEl = document.querySelector(".wave-day-tabs");
        if (!tabsEl) return;
        const seen = new Set();
        const names = [];
        for (const rec of recs) {
          for (const p of (rec.periods || [])) {
            if (p && p.name && !seen.has(p.name)) {
              seen.add(p.name);
              names.push(p.name);
            }
          }
        }
        if (!names.length) return;
        // 現在の waveDay が存在しなければ先頭にリセット
        if (!seen.has(waveDay)) waveDay = names[0];
        // ボタンを作り直して click ハンドラを再バインド
        tabsEl.innerHTML = names.map((nm) =>
          '<button data-day="' + escapeHtml(nm) + '"' +
          (nm === waveDay ? ' class="active"' : '') +
          '>' + escapeHtml(nm) + '</button>'
        ).join("");
        tabsEl.querySelectorAll("button").forEach((btn) => {
          btn.addEventListener("click", () => {
            waveDay = btn.getAttribute("data-day");
            tabsEl.querySelectorAll("button").forEach((b) =>
              b.classList.toggle("active", b === btn));
            renderWave();
          });
        });
      }

      function renderWave() {
        const sideEl = $("#wave-side");
        const synEl = $("#wave-synopsis");
        const layoutEl = synEl ? synEl.parentElement : null;  // .wave-layout

        const recs = marineRecords();
        if (!recs.length) {
          if (synEl) synEl.style.display = "none";
          if (layoutEl) layoutEl.classList.remove("has-data");
          sideEl.innerHTML = '<div style="color:var(--text-faint)">地方海上予報データがありません。<br><code>python3 data/jma-weather/fetch_marine.py</code> を実行してください。</div>';
          return;
        }
        if (layoutEl) layoutEl.classList.add("has-data");
        // day-tabs を実データの period 名から動的に組む (JMA は時刻帯で名前が変わる)
        syncWaveDayTabs(recs);

        // Leaflet 地図初期化 (1 回だけ)
        if (!_waveMap) {
          _waveMap = L.map("wave-leaflet-map", { zoomControl: true }).setView([36, 137], 5);
          // 基盤: CartoDB Positron (太平洋・東シナ海・日本海も含む大域カバー)
          L.tileLayer("https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png", {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright" target="_blank">OSM</a> &copy; <a href="https://carto.com/attributions" target="_blank">CARTO</a>',
            maxZoom: 12,
            opacity: 0.6,
          }).addTo(_waveMap);
          // 上層: 国土地理院 淡色 (日本付近の精度)
          L.tileLayer("https://cyberjapandata.gsi.go.jp/xyz/pale/{z}/{x}/{y}.png", {
            attribution: '<a href="https://maps.gsi.go.jp/development/ichiran.html" target="_blank" rel="noopener">地理院タイル (淡色)</a>',
            maxZoom: 18,
            minZoom: 3,
          }).addTo(_waveMap);
          // 凡例 (色分けの目安)
          const legend = L.control({ position: "bottomleft" });
          legend.onAdd = function () {
            const div = L.DomUtil.create("div", "wave-legend");
            div.innerHTML = WAVE_BINS.map((b) =>
              '<div><span class="sw" style="background:' + b.fill +
              ';border-color:' + b.stroke + ';opacity:' + Math.min(1, b.fillOpacity + 0.35) + '"></span>' +
              b.label + '</div>'
            ).join("");
            return div;
          };
          legend.addTo(_waveMap);
          // ズームレベル 6 以上で「詳細モード」: 海域名・風速も表示
          const updateLabelDetail = () => {
            const cont = document.getElementById("wave-leaflet-map");
            if (cont) cont.classList.toggle("show-detail", _waveMap.getZoom() >= 6);
          };
          _waveMap.on("zoomend", updateLabelDetail);
          _waveMap.on("zoomend moveend", () => thinLabels());
          updateLabelDetail();
        }
        if (_waveLayer) _waveLayer.remove();
        _waveLayer = L.layerGroup().addTo(_waveMap);
        _waveLabelMarkers = [];

        // 各レコードから現在の day の period を引いてくる
        const entries = recs.map((rec) => {
          const period = (rec.periods || []).find((p) => p.name === waveDay);
          return period ? { rec, period } : null;
        }).filter(Boolean);

        // 概況バー (synopses dedupe) — 地図の下に表示 (has-data 時はサイドパネルではない)
        const synopses = dedupeSynopses(recs);
        if (synopses.length) {
          synEl.style.display = "";
          synEl.innerHTML =
            '<span class="lab">概況</span>' +
            '<ul>' + synopses.map((s) =>
              '<li>' + escapeHtml(s).replace(/\n/g, "<br>") + '</li>'
            ).join("") + '</ul>';
        } else {
          synEl.style.display = "none";
        }

        // 各海域のポリゴン + ラベルマーカー
        for (const e of entries) {
          if (!e.rec.geometry) continue;
          const max = e.period.waveMaxM;
          const cls = waveCssClass(max);
          const bin = waveBin(max);
          const style = waveStyle(max);
          const waveTxt = (e.period.wave || []).map((s) => escapeHtml(s)).join("<br>");
          const windTxt = (e.period.wind || []).map((s) => escapeHtml(s)).join("<br>");
          const weatherTxt = (e.period.weather || []).map((s) => escapeHtml(s)).join("<br>");
          const visTxt = (e.period.vis || []).map((s) => escapeHtml(s)).join("<br>");
          const popupHtml =
            '<div style="font-weight:700; font-size:13px; margin-bottom:4px">' + escapeHtml(e.rec.areaName) + '</div>' +
            (waveTxt    ? '<div style="margin:3px 0"><b>波:</b><br>' + waveTxt + '</div>' : '') +
            (windTxt    ? '<div style="margin:3px 0"><b>風:</b><br>' + windTxt + '</div>' : '') +
            (weatherTxt ? '<div style="margin:3px 0"><b>天気:</b> ' + weatherTxt + '</div>' : '') +
            (visTxt     ? '<div style="margin:3px 0"><b>視程:</b><br>' + visTxt + '</div>' : '') +
            '<div style="font-size:10px; color:#aaa; margin-top:4px">発表: ' + escapeHtml(e.rec.publishingOffice || "") + '</div>';

          // ポリゴン (色塗り)
          const polyLayer = L.geoJSON(e.rec.geometry, { style }).addTo(_waveLayer);
          // autoPan: false — サイドリストから setView/fitBounds で中央に寄せた直後に、
          // popup の autoPan が地図をずらすのを防ぐ
          polyLayer.bindPopup(popupHtml, { maxWidth: 360, autoPan: false });
          polyLayer.on("mouseover", function () { this.setStyle({ weight: 2.5, fillOpacity: Math.min(0.7, style.fillOpacity + 0.2) }); });
          polyLayer.on("mouseout",  function () { this.setStyle(style); });
          // サイドリスト → 地図ジャンプ用に保持
          e._polyLayer = polyLayer;

          // 永続ラベル: 既定は「波高 + 方位」、show-detail のときに「海域名 + 風速」も表示
          if (e.rec.centroid && e.rec.centroid.lat != null) {
            const swell = e.period.hasSwell ? "*" : "";
            const valTxt = max != null ? (max + "m" + swell) : "–";
            const w = compactWind(e.period.wind, e.period.windPrimaryDirection);
            const labelHtml = '<div class="marine-label ' + cls + '" style="border-color:' + bin.stroke + '">' +
              '<span class="lbl-name">' + escapeHtml(shortAreaName(e.rec.areaName)) + '</span>' +
              '<span class="lbl-val" style="color:' + bin.text + '">🌊 ' + escapeHtml(valTxt) + '</span>' +
              (w.dir ? '<span class="lbl-wind">💨 ' + escapeHtml(w.dir) + '</span>' : '') +
              (w.knot ? '<span class="lbl-spd">' + escapeHtml(w.knot) +
                (w.ms ? ' / ' + escapeHtml(w.ms) : '') + '</span>' : '') +
              '</div>';
            const labelMarker = L.marker([e.rec.centroid.lat, e.rec.centroid.lon], {
              icon: L.divIcon({
                className: "marine-label-icon",
                html: labelHtml,
                iconSize: [90, 70],
                iconAnchor: [45, 35],
              }),
              interactive: false,
              keyboard: false,
            }).addTo(_waveLayer);
            _waveLabelMarkers.push({ marker: labelMarker, priority: max != null ? max : -1 });
          }
        }

        // 初回だけ全海域に fit
        if (!_waveFitted && _waveLayer.getLayers().length) {
          try {
            const bounds = L.featureGroup(_waveLayer.getLayers().filter((l) => l.getBounds)).getBounds();
            _waveMap.fitBounds(bounds, { padding: [20, 20], maxZoom: 6 });
          } catch (e) { /* fitBounds 失敗時は初期 setView のまま */ }
          _waveFitted = true;
        }
        // Leaflet が見えてからレイアウトが確定するので invalidateSize で再計算
        // その後 DOM が落ち着いてから間引きを実行 (marker.getElement() が non-null になる)
        setTimeout(() => {
          if (_waveMap) {
            _waveMap.invalidateSize();
            thinLabels();
          }
        }, 50);

        // サイドリスト (波高降順)
        const sorted = entries.slice().sort((a, b) => {
          const av = a.period.waveMaxM == null ? -1 : a.period.waveMaxM;
          const bv = b.period.waveMaxM == null ? -1 : b.period.waveMaxM;
          return bv - av;
        });
        sideEl.innerHTML =
          '<h3>地方海上予報 (' + waveDay + ')</h3>' +
          '<div class="list">' +
          sorted.map((e) => {
            const max = e.period.waveMaxM;
            const color = waveBin(max).text;
            const swell = e.period.hasSwell ? "*" : "";
            const valTxt = max != null ? (max + "m" + swell) : "–";
            const windTxt = (e.period.wind || []).map((s) => escapeHtml(s)).join("<br>");
            const waveTxt = (e.period.wave || []).map((s) => escapeHtml(s)).join("<br>");
            return '<div class="item" data-area-code="' + escapeHtml(e.rec.areaCode || "") + '" title="クリックで地図移動">' +
              '<div class="row">' +
                '<span class="nm">🌊 ' + escapeHtml(e.rec.areaName) + '</span>' +
                '<span class="v" style="color:' + color + '">' + escapeHtml(valTxt) + '</span>' +
              '</div>' +
              '<div class="raw">' +
                (waveTxt ? '<div><span class="lab">波</span>' + waveTxt + '</div>' : '') +
                (windTxt ? '<div><span class="lab">風</span>' + windTxt + '</div>' : '') +
              '</div>' +
              '</div>';
          }).join("") +
          '</div>' +
          '<div class="src">出典: 気象庁 <a href="https://www.jma.go.jp/bosai/seawarning/" target="_blank">海上警報・予報</a>。' +
          '原文の風は「ノット（m/s 換算）」併記。* = うねりを伴う。海域境界は <a href="https://www.jma.go.jp/bosai/common/const/geojson/marines.json" target="_blank">JMA bosai GeoJSON</a>。</div>';

        // クリックで地図ジャンプ (event delegation)。entries は areaCode で索引
        const byAreaCode = new Map();
        for (const e of entries) {
          if (e.rec.areaCode) byAreaCode.set(e.rec.areaCode, e);
        }
        sideEl.querySelectorAll(".item[data-area-code]").forEach((el) => {
          el.addEventListener("click", () => {
            const code = el.getAttribute("data-area-code");
            const e = byAreaCode.get(code);
            if (!e || !_waveMap) return;
            // ポリゴンの bbox を地図中央に収める (centroid 単独より海域全体が見える)
            if (e._polyLayer && typeof e._polyLayer.getBounds === "function") {
              try {
                _waveMap.fitBounds(e._polyLayer.getBounds(), {
                  padding: [60, 60],
                  maxZoom: 9,
                  animate: true,
                });
              } catch (err) {
                // fitBounds 失敗時は centroid フォールバック
                const c = e.rec.centroid;
                if (c && c.lat != null) {
                  _waveMap.setView([c.lat, c.lon], Math.max(_waveMap.getZoom(), 7), { animate: true });
                }
              }
            } else if (e.rec.centroid && e.rec.centroid.lat != null) {
              _waveMap.setView([e.rec.centroid.lat, e.rec.centroid.lon],
                Math.max(_waveMap.getZoom(), 7), { animate: true });
            }
            // 地図の移動が終わってから popup を開く (autoPan は無効化済みなのでズレない)
            if (e._polyLayer && typeof e._polyLayer.openPopup === "function") {
              const c = e.rec.centroid;
              if (c && c.lat != null) {
                e._polyLayer.openPopup([c.lat, c.lon]);
              } else {
                e._polyLayer.openPopup();
              }
            }
          });
        });
      }

      function renderMap() {
        const pinsEl = $("#map-pins");
        const svgEl = $(".map-wrap svg");
        const wrapEl = $("#map-wrap");
        if (!svgEl) { pinsEl.innerHTML = ""; return; }

        pinsEl.innerHTML = NATIONAL_CITIES.map((c) => {
          const pos = getPinPosition(c, svgEl, wrapEl);
          if (!pos) return "";
          const r = findRecord(c.office, nationalDay);
          const style = "left:" + pos.xPct + "%; top:" + pos.yPct + "%";

          const place = c.placement || "center";
          if (!r) {
            return '<div class="pin unavailable" data-place="' + place + '" style="' + style + '">' +
              '<div class="pin-card">' +
                '<div class="pin-city">' + escapeHtml(c.name) + '</div>' +
                '<div class="pin-icon">—</div>' +
                '<div class="pin-temp">—</div>' +
                '<div class="pin-pop">未取得</div>' +
              '</div></div>';
          }
          const pop = r.pop ? '☔ ' + r.pop + '%' : '';
          return '<div class="pin" data-office="' + c.office + '" data-place="' + place + '" style="' + style + '">' +
            '<div class="pin-card">' +
              '<div class="pin-city">' + escapeHtml(c.name) + '</div>' +
              '<div class="pin-icon">' + (r.weatherIcon || "—") + '</div>' +
              renderPinTemp(r.min, r.max) +
              (pop ? '<div class="pin-pop">' + escapeHtml(pop) + '</div>' : '') +
            '</div></div>';
        }).join("");

        pinsEl.querySelectorAll(".pin[data-office]").forEach((el) => {
          el.addEventListener("click", () => {
            const office = el.dataset.office;
            if (!items.some((i) => i.office === office)) return;
            selectedOffice = office;
            mode = "city";
            setActiveModeButton("#mode-city");
            $("#city-picker").value = office;
            render();
          });
        });
      }

      function renderList() {
        const cards = NATIONAL_CITIES.map((c) => {
          const r = findRecord(c.office, nationalDay);
          if (!r) {
            return '<div class="city-card" data-office="' + c.office + '" style="opacity:0.5">' +
              '<div class="icon">—</div>' +
              '<div class="city">' + escapeHtml(c.name) + '<span class="region">' + escapeHtml(c.region) + '</span></div>' +
              '<div class="weather">未取得</div>' +
              '<div class="temp-pop"><span class="temp-max">—</span></div>' +
            '</div>';
          }
          return '<div class="city-card" data-office="' + c.office + '">' +
            '<div class="icon">' + (r.weatherIcon || "—") + '</div>' +
            '<div class="city">' + escapeHtml(c.name) + '<span class="region">' + escapeHtml(c.region) + '</span></div>' +
            '<div class="weather">' + escapeHtml((r.weather || "").slice(0, 26)) + '</div>' +
            renderListTemp(r.min, r.max, r.pop) +
          '</div>';
        });
        $("#national-grid").innerHTML = cards.join("");
        document.querySelectorAll(".city-card[data-office]").forEach((el) => {
          el.addEventListener("click", () => {
            const office = el.dataset.office;
            if (!items.some((i) => i.office === office)) return;
            selectedOffice = office;
            mode = "city";
            setActiveModeButton("#mode-city");
            $("#city-picker").value = office;
            render();
          });
        });
      }

      // Wire up controls
      function setActiveModeButton(activeId) {
        ["#mode-city", "#mode-national", "#mode-typhoon", "#mode-chart", "#mode-wave"].forEach((sel) => {
          const el = $(sel);
          if (!el) return;
          if (sel === activeId) el.classList.add("active");
          else el.classList.remove("active");
        });
      }
      $("#mode-city").addEventListener("click", () => {
        mode = "city";
        setActiveModeButton("#mode-city");
        render();
      });
      $("#mode-national").addEventListener("click", () => {
        mode = "national";
        setActiveModeButton("#mode-national");
        render();
      });
      $("#mode-typhoon").addEventListener("click", () => {
        // 台風が無くてもタブは開ける (中身は「台風はありません」)
        mode = "typhoon";
        setActiveModeButton("#mode-typhoon");
        render();
      });
      $("#mode-chart").addEventListener("click", () => {
        mode = "chart";
        setActiveModeButton("#mode-chart");
        render();
      });
      $("#mode-wave").addEventListener("click", () => {
        mode = "wave";
        setActiveModeButton("#mode-wave");
        render();
      });
      // 波モードの day-tab は syncWaveDayTabs() が動的生成 + click バインドする (JMA は時刻帯で period 名が変わるため)
      // 天気図 chart-type サブタブ (実況 / 24h予想 / 48h予想)
      document.querySelectorAll("#chart-type-tabs button").forEach((btn) => {
        btn.addEventListener("click", () => {
          chartType = btn.getAttribute("data-ct");
          document.querySelectorAll("#chart-type-tabs button").forEach((b) =>
            b.classList.toggle("active", b === btn)
          );
          renderChart();
        });
      });
      $("#city-picker").addEventListener("change", (e) => {
        selectedOffice = e.target.value;
        render();
      });
      // 全国モードの day-tabs (wave-day-tabs を除外しないと両モードのボタンが衝突する)
      document.querySelectorAll(".day-tabs:not(.wave-day-tabs) button").forEach((btn) => {
        btn.addEventListener("click", () => {
          document.querySelectorAll(".day-tabs:not(.wave-day-tabs) button").forEach((b) => b.classList.remove("active"));
          btn.classList.add("active");
          nationalDay = btn.dataset.day;
          renderNational();
        });
      });
      document.querySelectorAll(".layout-tabs button").forEach((btn) => {
        btn.addEventListener("click", () => {
          document.querySelectorAll(".layout-tabs button").forEach((b) => b.classList.remove("active"));
          btn.classList.add("active");
          nationalLayout = btn.dataset.layout;
          renderNational();
        });
      });
      window.addEventListener("resize", () => {
        if (mode === "national" && nationalLayout === "map") {
          requestAnimationFrame(renderMap);
        }
      });

      load();
    </script>
  </body>
</html>
