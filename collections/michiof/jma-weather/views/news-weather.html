<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <title>天気予報</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #0b1530;
        --bg-grad: linear-gradient(180deg, #0b1530 0%, #122150 60%, #1a2f70 100%);
        --card: rgba(255, 255, 255, 0.08);
        --card-strong: rgba(255, 255, 255, 0.14);
        --border: rgba(255, 255, 255, 0.18);
        --text: #f1f5fc;
        --text-dim: #b3c5e8;
        --text-faint: #7d92bf;
        --accent: #ffd83d;
        --accent2: #4cb6ff;
        --warm: #ff8866;
        --cool: #4cd6ff;
        --land: #2a4677;
        --land-stroke: rgba(255, 255, 255, 0.18);
        --land-highlight: #3a5da0;
        --ocean: rgba(8, 20, 50, 0.4);
        --shadow: 0 6px 24px rgba(0, 0, 0, 0.35);
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        padding: 0;
        font-family: "Hiragino Kaku Gothic ProN", -apple-system, "Segoe UI", system-ui, sans-serif;
        background: var(--bg-grad);
        color: var(--text);
        min-height: 100%;
      }
      /* 既定で全幅 (台風モードと統一)。chart モードだけ画像可読性のため別途キャップする。 */
      .app { padding: 14px 14px 28px; max-width: none; margin: 0 auto; }
      @media (max-width: 600px) { .app { padding: 10px 10px 24px; } }
      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
        flex-wrap: wrap;
        margin-bottom: 14px;
      }
      .brand { display: flex; align-items: baseline; gap: 10px; }
      .brand h1 { font-size: 18px; margin: 0; letter-spacing: 0.04em; }
      .brand .updated { font-size: 11px; color: var(--text-faint); }
      .switch {
        display: inline-flex;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 999px;
        padding: 3px;
        gap: 2px;
      }
      .switch button {
        font: inherit;
        font-size: 12px;
        background: transparent;
        color: var(--text-dim);
        border: 0;
        padding: 6px 14px;
        border-radius: 999px;
        cursor: pointer;
      }
      .switch button.active {
        background: var(--accent);
        color: #1a1100;
        font-weight: 600;
      }
      .city-picker {
        display: flex; gap: 6px; align-items: center;
        font-size: 12px; color: var(--text-dim);
      }
      .city-picker select {
        font: inherit;
        background: var(--card);
        color: var(--text);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 5px 8px;
      }
      /* === CITY MODE === */
      /* 警報・注意報バー (city mode の最上段) */
      .warning-bar {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        align-items: center;
        padding: 10px 14px;
        background: var(--card-strong);
        border: 1px solid var(--border);
        border-radius: 12px;
        margin-bottom: 14px;
        box-shadow: var(--shadow);
      }
      .warning-bar .lab {
        font-size: 11px;
        color: var(--text-faint);
        font-weight: 600;
        letter-spacing: 0.06em;
        margin-right: 4px;
      }
      .warn-pill {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 4px 11px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.02em;
        white-space: nowrap;
      }
      .warn-pill.level-special {
        background: linear-gradient(135deg, #8a1ea3, #5a1370);
        color: #fff;
        border: 1px solid #c75ee3;
        box-shadow: 0 0 0 2px rgba(199, 94, 227, 0.18);
      }
      .warn-pill.level-warning {
        background: #c4332e;
        color: #fff;
        border: 1px solid #ff5d50;
      }
      .warn-pill.level-advisory {
        background: rgba(255, 216, 61, 0.92);
        color: #1a1100;
        border: 1px solid rgba(255, 216, 61, 0.55);
      }
      .warn-pill.level-none {
        background: transparent;
        color: var(--text-faint);
        border: 1px solid var(--border);
        font-weight: 400;
      }
      .warning-bar .meta {
        margin-left: auto;
        font-size: 10px;
        color: var(--text-faint);
      }
      /* 特別警報があるときは赤紫の縁取りで視認性を上げる */
      .warning-bar.has-special {
        border-color: #c75ee3;
        background: linear-gradient(180deg, rgba(138, 30, 163, 0.18), var(--card-strong));
      }
      .warning-bar.has-warning:not(.has-special) {
        border-color: #ff5d50;
      }

      /* 今日と明日 = 必ず同じ幅にしたい。1fr 1fr だと min-content の違いで片方が
         広くなる場合があるため minmax(0, 1fr) を使い、子の min-width も 0 にする。 */
      .hero { display: grid; grid-template-columns: minmax(0, 1fr) minmax(0, 1fr); gap: 14px; margin-bottom: 14px; }
      @media (max-width: 700px) { .hero { grid-template-columns: minmax(0, 1fr); } }
      .hero-card {
        position: relative;
        padding: 18px 20px;
        background: var(--card-strong);
        border: 1px solid var(--border);
        border-radius: 14px;
        box-shadow: var(--shadow);
        min-width: 0;  /* grid 子要素を均等幅にするため */
      }
      .hero-card .tag { font-size: 11px; letter-spacing: 0.08em; color: var(--accent); font-weight: 600; }
      .hero-card .date { font-size: 13px; color: var(--text-dim); margin-top: 2px; }
      .hero-card .main { display: flex; align-items: center; gap: 18px; margin-top: 10px; }
      .hero-card .icon-big { font-size: 64px; line-height: 1; }
      .hero-card .weather-text { font-size: 16px; font-weight: 600; line-height: 1.35; flex: 1; }
      .hero-card .temp { display: flex; gap: 14px; margin-top: 14px; align-items: baseline; }
      .hero-card .temp .max { font-size: 32px; font-weight: 700; color: var(--warm); }
      .hero-card .temp .min { font-size: 22px; color: var(--cool); }
      .hero-card .temp .unit { font-size: 13px; color: var(--text-faint); }
      .meta { display: grid; grid-template-columns: auto 1fr; gap: 4px 10px; font-size: 12px; color: var(--text-dim); margin-top: 12px; }
      .meta dt { color: var(--text-faint); }
      .meta dd { margin: 0; color: var(--text); }
      .pops-bar { display: flex; gap: 5px; margin-top: 6px; }
      .pops-bar .band { flex: 1; text-align: center; background: rgba(255, 255, 255, 0.05); padding: 5px 4px; border-radius: 5px; font-size: 11px; }
      .pops-bar .band .band-label { color: var(--text-faint); font-size: 10px; }
      .pops-bar .band .band-val { font-size: 14px; font-weight: 600; color: var(--cool); }
      /* 3 時間ごと時系列ストリップ (地域時系列予報) */
      .hourly-strip { display: flex; gap: 4px; margin-top: 8px; overflow-x: auto; min-width: 0; }
      .hourly-strip .h-cell {
        flex: 1 0 50px;
        min-width: 50px;
        text-align: center;
        background: rgba(255, 255, 255, 0.04);
        border-radius: 6px;
        padding: 5px 3px;
        font-size: 10px;
      }
      .hourly-strip .h-time { color: var(--text-faint); font-size: 10px; }
      .hourly-strip .h-icon { font-size: 20px; line-height: 1.2; margin: 1px 0; }
      .hourly-strip .h-temp { color: var(--warm); font-weight: 600; font-size: 12px; }
      .hourly-strip .h-wind { color: var(--text-dim); font-size: 9px; margin-top: 1px; }
      .weekly { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 12px 14px; box-shadow: var(--shadow); }
      .weekly h2 { margin: 0 0 8px; font-size: 13px; color: var(--text-dim); font-weight: 600; letter-spacing: 0.05em; }
      .weekly-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
      .week-day { background: rgba(255, 255, 255, 0.04); border-radius: 8px; padding: 8px 4px; text-align: center; }
      .week-day .wd { font-size: 11px; color: var(--text-dim); }
      .week-day .md { font-size: 10px; color: var(--text-faint); }
      .week-day .icon { font-size: 24px; margin: 3px 0; }
      .week-day .temps { font-size: 11px; line-height: 1.3; }
      .week-day .temp-max { color: var(--warm); font-weight: 600; }
      .week-day .temp-min { color: var(--cool); }
      .week-day .pop { font-size: 10px; color: var(--accent2); margin-top: 2px; }
      .week-day.is-today { background: rgba(255, 216, 61, 0.15); outline: 1px solid var(--accent); }
      .week-day.weekend-sat .wd { color: #6ec5ff; }
      .week-day.weekend-sun .wd { color: #ff96a0; }
      .overview { margin-top: 12px; background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 12px 14px; font-size: 12px; line-height: 1.65; color: var(--text-dim); max-height: 280px; overflow-y: auto; }
      .overview h2 { margin: 0 0 6px; font-size: 12px; color: var(--text-faint); font-weight: 600; letter-spacing: 0.05em; }
      .overview p { margin: 0 0 6px; white-space: pre-wrap; }
      /* === NATIONAL MODE === */
      .national-controls { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-bottom: 10px; }
      .tab-pill {
        display: inline-flex; gap: 4px;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 2px;
      }
      .tab-pill button {
        font: inherit; font-size: 12px;
        background: transparent;
        color: var(--text-dim);
        border: 0; padding: 4px 12px;
        border-radius: 6px; cursor: pointer;
      }
      .tab-pill.day-tabs button.active { background: var(--accent2); color: #001e3a; font-weight: 600; }
      .tab-pill.layout-tabs button.active { background: var(--text); color: #001e3a; font-weight: 600; }
      .tab-pill.tmode-tabs button.active { background: var(--accent2); color: #001e3a; font-weight: 600; }

      /* === JAPAN MAP === */
      .map-wrap {
        position: relative;
        /* 1:1 SVG なので viewport 高さ基準で上限を切る。スクロールせず収まるサイズ */
        width: min(100%, 80vh);
        margin: 0 auto;
        background:
          radial-gradient(ellipse at 30% 20%, rgba(76, 182, 255, 0.15), transparent 50%),
          radial-gradient(ellipse at 80% 80%, rgba(255, 216, 61, 0.08), transparent 50%),
          var(--ocean);
        border: 1px solid var(--border);
        border-radius: 14px;
        overflow: hidden;
        box-shadow: var(--shadow);
        aspect-ratio: 1 / 1;
      }
      .map-wrap svg.geolonia-svg-map {
        display: block;
        width: 100%;
        height: 100%;
      }
      /* Override Geolonia's default fill/stroke for our TV-weather palette */
      .map-wrap .prefecture {
        fill: var(--land);
        stroke: var(--land-stroke);
        stroke-width: 0.6;
        transition: fill .15s;
      }
      .map-wrap .prefecture.highlight {
        fill: var(--land-highlight);
      }
      .map-pins {
        position: absolute;
        inset: 0;
        pointer-events: none;
      }
      .pin {
        position: absolute;
        transform: translate(-50%, -50%);
        pointer-events: auto;
        cursor: pointer;
        z-index: 2;
      }
      /* placement: 都道府県中心からカードを海側にオフセット (被り回避)。
         translate(-50%, -50%) を基点に、方向別に追加オフセット (70px)。
         引き出し線は不要 (前回試して不自然だった) ので付けない。 */
      .pin[data-place="N"]  { transform: translate(-50%, calc(-50% - 70px)); }
      .pin[data-place="S"]  { transform: translate(-50%, calc(-50% + 70px)); }
      .pin[data-place="E"]  { transform: translate(calc(-50% + 70px), -50%); }
      .pin[data-place="W"]  { transform: translate(calc(-50% - 70px), -50%); }
      .pin[data-place="NE"] { transform: translate(calc(-50% + 50px), calc(-50% - 50px)); }
      .pin[data-place="NW"] { transform: translate(calc(-50% - 50px), calc(-50% - 50px)); }
      .pin[data-place="SE"] { transform: translate(calc(-50% + 50px), calc(-50% + 50px)); }
      .pin[data-place="SW"] { transform: translate(calc(-50% - 50px), calc(-50% + 50px)); }
      /* カード = 都道府県の上に置く台座型。dot は廃止。 */
      .pin .pin-card {
        background: rgba(8, 18, 45, 0.92);
        border: 1px solid rgba(255, 216, 61, 0.45);
        border-radius: 11px;
        padding: 7px 12px 6px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0;
        backdrop-filter: blur(6px);
        font-size: 12px;
        line-height: 1.15;
        white-space: nowrap;
        box-shadow: 0 3px 10px rgba(0,0,0,0.45), inset 0 1px 0 rgba(255,255,255,0.06);
        min-width: 70px;
        transition: transform .12s, box-shadow .12s, border-color .12s;
      }
      .pin .pin-city {
        font-weight: 700;
        font-size: 13px;
        color: var(--text);
        letter-spacing: 0.02em;
      }
      .pin .pin-icon {
        font-size: 30px;
        line-height: 1.05;
        margin: 2px 0;
      }
      .pin .pin-temp {
        color: var(--warm);
        font-weight: 700;
        font-size: 16px;
      }
      .pin .pin-temp .min {
        color: var(--cool);
        font-weight: 400;
        font-size: 13px;
        margin-left: 2px;
      }
      .pin .pin-pop {
        color: var(--accent2);
        font-size: 11px;
        margin-top: 2px;
      }
      /* ───── 海上予報モード (地方海上予報 = JMA bosai/seawarning) ───── */
      /* (max-width は .app の既定値=none を継承して全幅) */
      .wave-controls { display: flex; gap: 12px; align-items: center; margin-bottom: 10px; flex-wrap: wrap; }
      /* マップは Leaflet (国土地理院 淡色) + JMA 海域ポリゴン。 */
      .wave-layout { display: flex; flex-direction: column; gap: 14px; }
      .wave-leaflet-map {
        height: 70vh;
        min-height: 480px;
        border: 1px solid var(--border);
        border-radius: 12px;
        overflow: hidden;
        background: #0e1c33;
      }
      /* 各海域の中央に置く永続ラベル (Leaflet divIcon)
       * 既定: 波高 + 方位の 2 行ミニマル
       * .wave-leaflet-map.show-detail のとき: 海域名・風速も表示 (4 行)
       */
      .marine-label {
        display: inline-block;
        background: rgba(8, 18, 45, 0.88);
        border: 1px solid rgba(76, 214, 255, 0.5);
        border-radius: 6px;
        padding: 3px 7px 4px;
        font-size: 11px;
        line-height: 1.3;
        color: var(--cool);
        text-align: center;
        white-space: nowrap;
        box-shadow: 0 1px 4px rgba(0,0,0,0.4);
        font-family: inherit;
      }
      .marine-label > span { display: block; }
      .marine-label .lbl-name { color: var(--text-faint); font-size: 10px; margin-bottom: 1px; }
      .marine-label .lbl-val { font-weight: 700; font-variant-numeric: tabular-nums; font-size: 13px; }
      .marine-label .lbl-wind { font-size: 10px; color: var(--text); margin-top: 1px; }
      .marine-label .lbl-spd { font-size: 10px; color: var(--text); font-variant-numeric: tabular-nums; }
      /* 波高ビン別のテキスト色は inline style で当てる (waveBin() の text フィールド)。
         背景色強調は ≥4m (bin 4 以上 = 注意領域) のときだけ濃い赤系にする。 */
      .marine-label.wc-4 { background: rgba(60, 30, 10, 0.92); }
      .marine-label.wc-5 { background: rgba(70, 20, 15, 0.92); }
      .marine-label.wc-6 { background: rgba(80, 10, 20, 0.92); }
      .leaflet-div-icon.marine-label-icon { background: transparent; border: none; }
      /* デフォルト (ズームアウト) は海域名・風速を隠す。風向は残す。 */
      .marine-label .lbl-name,
      .marine-label .lbl-spd { display: none; }
      /* zoom 閾値以上 (show-detail) で詳細表示 */
      .wave-leaflet-map.show-detail .marine-label .lbl-name { display: block; }
      .wave-leaflet-map.show-detail .marine-label .lbl-spd { display: block; }
      /* 凡例 */
      .wave-legend {
        background: rgba(20, 30, 50, 0.85);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 6px 10px;
        font-size: 11px;
        color: var(--text-dim);
        line-height: 1.7;
      }
      .wave-legend .sw {
        display: inline-block;
        width: 14px;
        height: 10px;
        border: 1px solid;
        margin-right: 6px;
        vertical-align: -1px;
      }
      /* Leaflet popup を dark テーマに合わせる */
      .leaflet-popup-content-wrapper, .leaflet-popup-tip {
        background: rgba(20, 30, 50, 0.95);
        color: var(--text);
      }
      .leaflet-popup-content { font-size: 12px; line-height: 1.55; }
      .wave-side { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 14px; font-size: 12px; color: var(--text-dim); }
      /* サイドリストはマップの下に並ぶので、画面横幅を活かして 2-3 列の grid 表示 */
      .wave-side .list { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 8px 18px; }
      .wave-side .list > .item { padding-bottom: 6px; border-bottom: 1px solid rgba(255,255,255,0.05); cursor: pointer; border-radius: 6px; padding: 4px 6px; transition: background-color .12s; }
      .wave-side .list > .item:hover { background: rgba(255,255,255,0.06); }
      .wave-side h3 { font-size: 14px; margin: 0 0 8px; color: var(--text); padding-bottom: 4px; border-bottom: 1px solid var(--border); }
      .wave-side .row { display: flex; gap: 8px; padding: 6px 0 2px; align-items: baseline; }
      .wave-side .row .nm { color: var(--text); font-weight: 600; }
      .wave-side .row .v { margin-left: auto; font-variant-numeric: tabular-nums; font-weight: 700; font-size: 13px; }
      .wave-side .raw { font-size: 10px; color: var(--text-faint); padding-bottom: 6px; border-bottom: 1px solid rgba(255,255,255,0.05); margin-bottom: 4px; line-height: 1.55; }
      .wave-side .raw .lab { color: var(--text-dim); font-weight: 600; margin-right: 4px; }
      .wave-side .src { font-size: 10px; color: var(--text-faint); margin-top: 12px; line-height: 1.5; }
      .wave-side .src a { color: var(--text-faint); }

      /* 概況バー (低気圧・前線・台風中心 などの synopses をマップ下にまとめる) */
      .wave-synopsis {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 10px 14px;
        margin-top: 12px;
        font-size: 12px;
        color: var(--text-dim);
        line-height: 1.6;
      }
      .wave-synopsis .lab { color: var(--text); font-weight: 600; margin-right: 6px; }
      .wave-synopsis ul { margin: 4px 0 0; padding-left: 1.2em; }
      .wave-synopsis li { white-space: pre-wrap; margin-bottom: 2px; }

      .pin:hover .pin-card {
        background: rgba(8, 18, 45, 0.98);
        border-color: var(--accent);
        transform: translateY(-2px);
        box-shadow: 0 6px 16px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.08);
      }
      .pin.unavailable .pin-card {
        opacity: 0.45;
        border-color: var(--border);
      }
      .map-attrib {
        position: absolute;
        right: 10px;
        bottom: 8px;
        font-size: 10px;
        color: rgba(255,255,255,0.4);
        letter-spacing: 0.02em;
        pointer-events: auto;
      }
      .map-attrib a { color: inherit; text-decoration: underline; }

      /* === LIST GRID === */
      .national-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
        gap: 10px;
      }
      .city-card {
        background: var(--card-strong);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 12px;
        display: grid;
        grid-template-columns: auto 1fr;
        gap: 6px 12px;
        align-items: center;
        cursor: pointer;
      }
      .city-card:hover { background: rgba(255, 255, 255, 0.18); transform: translateY(-1px); }
      .city-card .icon { font-size: 38px; grid-row: span 3; }
      .city-card .city { font-size: 14px; font-weight: 600; }
      .city-card .city .region { font-size: 10px; color: var(--text-faint); font-weight: 400; margin-left: 4px; }
      .city-card .weather { font-size: 11px; color: var(--text-dim); line-height: 1.3; }
      .city-card .temp-pop { font-size: 12px; display: flex; gap: 10px; align-items: baseline; }
      .city-card .temp-max { color: var(--warm); font-weight: 600; font-size: 14px; }
      .city-card .temp-min { color: var(--cool); }
      .city-card .pop { color: var(--accent2); margin-left: auto; font-size: 11px; }
      .empty { text-align: center; padding: 40px 20px; color: var(--text-faint); font-size: 13px; }
      .empty .icon { font-size: 48px; margin-bottom: 8px; }
      .err { margin: 14px 0; padding: 10px 14px; background: rgba(255, 80, 100, 0.15); border: 1px solid rgba(255, 80, 100, 0.4); border-radius: 8px; color: #ffb3c0; font-size: 12px; }

      /* ───── 台風タブ (常時表示。active 台風がいないときは薄く表示するだけ) ───── */
      #mode-typhoon:not(.has-active) { opacity: 0.55; }
      /* (台風モードは .app の既定 max-width:none をそのまま継承) */
      .typhoon-empty {
        position: absolute; inset: 0; display: flex; flex-direction: column;
        align-items: center; justify-content: center; gap: 10px;
        color: var(--text-faint); pointer-events: none; z-index: 500;
        background: rgba(17,26,53,0.55);
      }
      .typhoon-empty .icon { font-size: 56px; opacity: 0.4; }
      .typhoon-empty .msg { font-size: 14px; }
      .typhoon-empty .sub { font-size: 11px; opacity: 0.7; }
      .typhoon-layout { display: grid; grid-template-columns: 1fr 360px; gap: 16px; height: calc(100vh - 180px); min-height: 520px; }
      .typhoon-map { background: #111a35; border: 1px solid var(--border); border-radius: 12px; overflow: hidden; position: relative; }
      .typhoon-side { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 14px; overflow-y: auto; font-size: 12px; color: var(--text-dim); }
      .typhoon-side h3 { font-size: 14px; margin: 14px 0 6px; color: var(--text); padding-bottom: 4px; border-bottom: 2px solid currentColor; transition: filter .12s; }
      .typhoon-side h3:first-child { margin-top: 0; }
      /* 地図ジャンプ可能な (= active な) 見出しだけクリック装飾を付ける */
      .typhoon-side h3[data-event-id] { cursor: pointer; }
      .typhoon-side h3[data-event-id]:hover { filter: brightness(1.25); }
      .typhoon-side h3[data-event-id]::after { content: " ↗"; font-size: 11px; opacity: 0.55; }
      .typhoon-side table { width: 100%; border-collapse: collapse; font-size: 11px; }
      .typhoon-side th, .typhoon-side td { padding: 4px 5px; border-bottom: 1px solid rgba(255,255,255,0.07); text-align: left; vertical-align: top; line-height: 1.35; }
      .typhoon-side th { background: rgba(255,255,255,0.05); color: var(--text-faint); font-weight: 500; font-size: 10px; }
      .typhoon-side td.dim { color: var(--text-faint); }
      .typhoon-side .archived-tag { display: inline-block; padding: 1px 6px; border-radius: 3px; background: rgba(255,180,60,0.18); color: #ffd089; font-size: 10px; margin-left: 6px; vertical-align: middle; }
      .typhoon-side .dissipating-tag { display: inline-block; padding: 1px 6px; border-radius: 3px; background: rgba(150,200,255,0.18); color: #b6dcff; font-size: 10px; margin-left: 6px; vertical-align: middle; }
      .typhoon-legend { position: absolute; left: 12px; bottom: 12px; background: rgba(255,255,255,0.95); color: #111; padding: 8px 12px; border-radius: 6px; font-size: 11px; line-height: 1.7; box-shadow: 0 1px 6px rgba(0,0,0,0.25); z-index: 1000; }
      .typhoon-legend .sw { display: inline-block; width: 11px; height: 11px; border: 1px solid #444; vertical-align: middle; margin-right: 5px; }
      .typhoon-label-tag { background: rgba(255,255,255,0.92); padding: 1px 5px; border-radius: 3px; border: 1px solid #888; font-size: 10px; font-weight: 600; white-space: nowrap; color: #111; }
      .typhoon-source { font-size: 10px; color: var(--text-faint); margin-top: 14px; line-height: 1.5; }
      .typhoon-source a { color: var(--text-faint); }
      .typhoon-toolbar { display: flex; gap: 12px; align-items: center; margin-bottom: 10px; flex-wrap: wrap; }
      #typhoon-time-controls { display: flex; gap: 10px; align-items: center; flex: 1; min-width: 360px; }
      #typhoon-slider { flex: 1; accent-color: var(--accent2); cursor: pointer; }
      #typhoon-time-label { color: var(--text); font-size: 12px; min-width: 200px; font-variant-numeric: tabular-nums; }
      .typhoon-play-btn { background: var(--accent2); color: #001e3a; border: none; padding: 6px 12px; border-radius: 6px; font-weight: 600; cursor: pointer; font-size: 13px; min-width: 40px; }
      .typhoon-play-btn:disabled { opacity: 0.4; cursor: default; }
      @media (max-width: 800px) {
        .typhoon-layout { grid-template-columns: 1fr; height: auto; }
        .typhoon-map { height: 60vh; min-height: 380px; }
      }

      /* ───── 天気図タブ (JMA 公式 PNG 表示) ───── */
      /* (max-width は .app の既定値=none を継承して台風モードと統一。
         PNG は素のサイズ以上には拡大しないよう .chart-frame img 側でキャップ) */
      .chart-toolbar { display: flex; gap: 12px; align-items: center; margin-bottom: 10px; flex-wrap: wrap; }
      .chart-frame { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 14px; text-align: center; }
      /* JMA の天気図 PNG は概ね 1280x900。それ以上に拡大するとぼやけるので max-width で頭打ち */
      .chart-frame img { max-width: min(100%, 1400px); height: auto; background: #fff; border-radius: 6px; box-shadow: 0 1px 6px rgba(0,0,0,0.3); }
      .chart-frame .empty { color: var(--text-faint); padding: 60px 20px; }
      .chart-frame .meta { color: var(--text-dim); font-size: 12px; margin-top: 10px; line-height: 1.5; }
      .chart-frame .meta a { color: var(--text-faint); }

      /* ============================================================
         RESPONSIVE — 天気予報 (city/national) を全幅 + 任意の画面幅対応
         台風モードと同じく .app は全幅。各セクションは画面幅に応じて
         レイアウト/フォントを調整する。
         ============================================================ */

      /* ---- 概要を右サイドパネルとして表示 (台風モードの 1fr 360px と同じ思想) ----
         hero + weekly を左カラムに積み、概要を右の細いカラムに固定する。
         概要が無いとき (#view-city に has-overview クラスが付かない) は従来通り縦積み。 */
      @media (min-width: 900px) {
        #view-city.has-overview {
          display: grid;
          grid-template-columns: minmax(0, 1fr) 360px;
          grid-template-areas:
            "hero   overview"
            "weekly overview";
          gap: 14px 18px;
          align-items: start;
        }
        /* 警報バーがあるときだけ最上段に "warnings warnings" 行を追加 */
        #view-city.has-overview.has-warning {
          grid-template-areas:
            "warnings warnings"
            "hero     overview"
            "weekly   overview";
        }
        #view-city.has-overview > .warning-bar { grid-area: warnings; margin-bottom: 0; }
        #view-city.has-overview > .hero { grid-area: hero; margin-bottom: 0; }
        #view-city.has-overview > .weekly { grid-area: weekly; }
        #view-city.has-overview > .overview {
          grid-area: overview;
          margin-top: 0;
          max-height: calc(100vh - 140px);
          align-self: stretch;
        }
      }
      /* ---- 超ワイド (≥ 1600px): サイドパネル少し広めに ---- */
      @media (min-width: 1600px) {
        #view-city.has-overview {
          grid-template-columns: minmax(0, 1fr) 420px;
        }
      }

      /* ---- 波モード: 地方海上予報リストを右サイドパネル / 概況を地図の下 ----
         台風モードと同じく右側に細いサイドパネルを置き、その中に海域別リスト
         (.wave-side) を入れる。概況 (.wave-synopsis) は左カラムの地図直下に置く。
         データが無いとき (has-data が付かない) は従来通り縦積み。 */
      @media (min-width: 900px) {
        /* 全体の高さを 1 つ決めて、左 (map + 概況) と右 (海域リスト) の
           底辺が同じ位置で終わるようにする。
           - 高さ = 100vh - 160px (台風モードの calc(100vh - 180px) と同等感)
           - 左 row1 = 1fr (地図が残りを全部埋める)
           - 左 row2 = auto (概況テキストの自然な高さ。最大は別途キャップ)
           - 右 side = 2 行スパン + height:100% で 同じ底辺で終わる */
        #view-wave .wave-layout.has-data {
          display: grid;
          grid-template-columns: minmax(0, 1fr) 360px;
          grid-template-rows: minmax(0, 1fr) auto;
          grid-template-areas:
            "map      side"
            "synopsis side";
          gap: 14px 18px;
          height: calc(100vh - 160px);
          min-height: 520px;
          align-items: stretch;
        }
        #view-wave .wave-layout.has-data > .wave-leaflet-map {
          grid-area: map;
          height: 100%;
          min-height: 0;  /* grid 子要素を 100% に収めるため */
        }
        #view-wave .wave-layout.has-data > .wave-synopsis {
          grid-area: synopsis;
          margin-top: 0;
          max-height: 28vh;
          overflow-y: auto;
        }
        #view-wave .wave-layout.has-data > .wave-side {
          grid-area: side;
          height: 100%;
          min-height: 0;
          overflow-y: auto;
        }
        /* 右サイドの海域リストは 1 カラムでよい (パネルが狭いため) */
        #view-wave .wave-layout.has-data > .wave-side .list {
          grid-template-columns: minmax(0, 1fr);
        }
      }
      @media (min-width: 1600px) {
        #view-wave .wave-layout.has-data {
          grid-template-columns: minmax(0, 1fr) 420px;
        }
      }

      /* ---- 超ワイド (≥ 1900px): hero card のフォント拡大 ---- */
      @media (min-width: 1900px) {
        .hero-card .icon-big { font-size: 72px; }
        .hero-card .temp .max { font-size: 40px; }
        .hero-card .temp .min { font-size: 26px; }
        .week-day .icon { font-size: 30px; }
      }

      /* ---- タブレット (≤ 900px): topbar 整理、weekly セルやや圧縮 ---- */
      @media (max-width: 900px) {
        .brand h1 { font-size: 16px; }
        .hero-card { padding: 14px 16px; }
        .hero-card .icon-big { font-size: 56px; }
        .hero-card .temp .max { font-size: 28px; }
      }

      /* ---- モバイル (≤ 600px): weekly grid を 4 列 × 2 行に折り返し ---- */
      @media (max-width: 600px) {
        .topbar { gap: 8px; margin-bottom: 10px; }
        .brand h1 { font-size: 15px; }
        .switch { padding: 2px; }
        .switch button { padding: 5px 10px; font-size: 11px; }
        .city-picker { font-size: 11px; }
        .city-picker select { padding: 4px 6px; font-size: 11px; }
        .hero { gap: 10px; margin-bottom: 10px; }
        .hero-card { padding: 12px 14px; border-radius: 12px; }
        .hero-card .icon-big { font-size: 48px; }
        .hero-card .weather-text { font-size: 14px; }
        .hero-card .temp { gap: 10px; margin-top: 10px; }
        .hero-card .temp .max { font-size: 26px; }
        .hero-card .temp .min { font-size: 18px; }
        .weekly { padding: 10px 12px; border-radius: 12px; }
        .weekly-grid { grid-template-columns: repeat(4, 1fr); gap: 5px; }
        .week-day { padding: 6px 3px; }
        .week-day .icon { font-size: 20px; margin: 2px 0; }
        .overview { padding: 10px 12px; font-size: 11px; line-height: 1.55; }
        /* national mode: 都市カードのグリッドをよりタイトに */
        .national-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 8px; }
        .city-card { padding: 10px; gap: 4px 10px; }
        .city-card .icon { font-size: 32px; }
        .city-card .city { font-size: 13px; }
        /* 国地図に置く pin が画面外に出にくいよう、絶対オフセットを縮める */
        .pin[data-place="N"]  { transform: translate(-50%, calc(-50% - 40px)); }
        .pin[data-place="S"]  { transform: translate(-50%, calc(-50% + 40px)); }
        .pin[data-place="E"]  { transform: translate(calc(-50% + 40px), -50%); }
        .pin[data-place="W"]  { transform: translate(calc(-50% - 40px), -50%); }
        .pin[data-place="NE"] { transform: translate(calc(-50% + 30px), calc(-50% - 30px)); }
        .pin[data-place="NW"] { transform: translate(calc(-50% - 30px), calc(-50% - 30px)); }
        .pin[data-place="SE"] { transform: translate(calc(-50% + 30px), calc(-50% + 30px)); }
        .pin[data-place="SW"] { transform: translate(calc(-50% - 30px), calc(-50% + 30px)); }
        .pin .pin-card { padding: 5px 8px 4px; font-size: 10px; min-width: 56px; }
        .pin .pin-city { font-size: 11px; }
        .pin .pin-icon { font-size: 22px; }
        .pin .pin-temp { font-size: 13px; }
      }

      /* ---- 極小 (≤ 400px): スイッチをスクロール許容に ---- */
      @media (max-width: 400px) {
        .topbar > div { flex-wrap: nowrap; overflow-x: auto; max-width: 100%; }
        .weekly-grid { grid-template-columns: repeat(3, 1fr); }
        .hero-card .icon-big { font-size: 42px; }
      }
    </style>
    <!-- Leaflet (台風モードの地図用、head で常時 load) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  </head>

      <!-- WAVE MODE — 地方海上予報 (波 + 風) -->

        <div class="wave-controls">

        </div>

      <!-- WEATHER CHART MODE — 地上天気図 (JMA 公式 PNG) -->
      <section id="view-chart" style="display:none">
        <div class="chart-toolbar">
          <div class="tab-pill tmode-tabs" id="chart-type-tabs">

            <button data-ct="fcst48">48h予想</button>

        <div class="chart-frame" id="chart-frame"></div>
      </section>

      <!-- TYPHOON MODE — タブは常時表示。台風が居ないときは map に empty overlay を出す -->
      <section id="view-typhoon" style="display:none">
        <div class="typhoon-toolbar">
          <div class="tab-pill tmode-tabs">
            <button data-tmode="all" class="active">全期間</button>
            <button data-tmode="single">時刻スライド</button>
          </div>
          <div id="typhoon-time-controls" style="display:none">
            <button id="typhoon-play" class="typhoon-play-btn" title="再生 / 一時停止">▶</button>
            <input type="range" id="typhoon-slider" min="0" max="0" step="1" value="0" />
            <span id="typhoon-time-label">—</span>
          </div>
        </div>
        <div class="typhoon-layout">
          <div class="typhoon-map" id="typhoon-map"></div>
          <div class="typhoon-side" id="typhoon-side"></div>
        </div>
